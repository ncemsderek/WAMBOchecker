/* ============================================================
   PHOTOS
   ============================================================ */
function handlePhoto(e, target, previewId) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    if (target === 'walkAround') APP.check.walkAround.photo = ev.target.result;
    else if (target === 'cooler') APP.check.cooler.photo = ev.target.result;
    const preview = document.getElementById(previewId);
    if (preview) preview.innerHTML = `<img class="photo-preview" src="${ev.target.result}" />`;
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   PROGRESS
   ============================================================ */
function updateProgress() {
  const c = APP.check;
  if (!c) return;
  let total = 0, done = 0, flags = 0;

  if (c.type === 'ambulance') {
    // Meta
    total += 2; if (c.initials) done++; if (c.mileage) done++;
    // Mechanical + Fluids
    [...APP.data.mechanicalChecks, ...APP.data.fluidChecks].forEach(item => {
      total++;
      const bucketFor = APP.data.mechanicalChecks.includes(item) ? c.mechanical : c.fluids;
      if (bucketFor[item]?.status) {
        done++;
        if (bucketFor[item].status === 'bad' && !bucketFor[item].fixed) flags++;
      }
    });
    // Fuel
    total++; if (c.fuel) { done++; if (c.fuel !== 'Full') flags++; }
    // Tires
    APP.data.tirePositions.forEach((pos, i) => {
      total++;
      if (c.tires[i]) {
        done++;
        const v = parseFloat(c.tires[i]);
        if (!isNaN(v) && (v < pos.min || v > pos.max)) flags++;
      }
    });
    // Electronics
    APP.data.electronicsDevices.forEach(dev => {
      total++;
      if (c.electronics[dev.name] !== undefined) {
        done++;
        if (dev.critical && c.electronics[dev.name] === false) flags++;
      }
    });
    // Cooler
    total++; if (c.cooler.answered) { done++; if (c.cooler.ok === false) flags++; }
    // Compartments — count total items (direct + nested bag items)
    [...c._comps.exterior, ...c._comps.interior].forEach(comp => {
      const compItems = comp.items.length + (comp.bags || []).reduce((n, b) => n + b.items.length, 0);
      total += compItems;
      const cs = c.compartments[comp.name];
      if (cs) {
        Object.values(cs.items || {}).forEach(it => {
          if (it.status) done++;
          if (it.status === 'abnormal' && !it.fixed) flags++;
        });
        (comp.bags || []).forEach(bag => {
          const bs = cs.bags?.[bag.name];
          if (bs) {
            Object.values(bs.items || {}).forEach(it => {
              if (it.status) done++;
              if (it.status === 'abnormal' && !it.fixed) flags++;
            });
          }
        });
      }
    });
  } else if (c.type === 'rescue') {
    total += 2; // initials, mileage
    if (c.initials) done++;
    if (c.mileage) done++;
    const r = APP.data.rescueRigChecks;
    ['exterior','fluids','interior','operational','cleaning'].forEach(group => {
      r[group].forEach(item => {
        total++;
        const key = `${group}::${item}`;
        if (c.rescueChecks[key]?.status) {
          done++;
          if (c.rescueChecks[key].status === 'bad' && !c.rescueChecks[key].fixed) flags++;
        }
      });
    });
  }

  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const label = c.type === 'ambulance' ? 'Ambulance check' : 'Rescue check';
  document.getElementById('status-label').textContent = `${label} is ${pct}% complete`;
  document.getElementById('status-flags').textContent = flags > 0 ? `⚠ ${flags} flag${flags===1?'':'s'}` : '';
  document.getElementById('status-fill').style.width = pct + '%';
}

/* ============================================================
   SUBMIT
   ============================================================ */
async function submitCheck() {
  const c = APP.check;
  if (!c) return;
  if (!c.initials) {
    alert('Please enter your initials before submitting.');
    return;
  }

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const summary = buildSummary();
    const params = {
      unit_id: c.unitName,
      check_date: c.date,
      check_type: c.type,
      initials: c.initials,
      message: summary.plain,
      flags_count: summary.flagCount,
      to_email: APP.data.submissionEmail || 'd.boyce@northcountryems.org',
    };
    await emailjs.send(APP.data.emailjs.serviceId, APP.data.emailjs.templateId, params);
    showSuccess(summary);
  } catch (err) {
    console.error('Submit failed:', err);
    alert('Submit failed: ' + (err.text || err.message || 'unknown error') + '\n\nThe check data is still in the app — try submitting again, or take a screenshot.');
    btn.disabled = false;
    btn.textContent = 'Submit Check';
  }
}

function buildSummary() {
  const c = APP.check;
  const lines = [];
  let flagCount = 0;

  lines.push(`APPARATUS CHECK SUBMISSION`);
  lines.push(`==========================`);
  lines.push(`Unit: ${c.unitName}`);
  lines.push(`Date: ${c.date}`);
  lines.push(`Crew Initials: ${c.initials}`);
  lines.push(`Type: ${c.type === 'ambulance' ? 'Ambulance' : 'Rescue Rig'}`);
  lines.push('');

  if (c.type === 'ambulance') {
    if (c.mileage) lines.push(`Mileage: ${c.mileage}`);
    lines.push('');
    if (c.walkAround.notes) {
      lines.push('WALK-AROUND NOTES:');
      lines.push(c.walkAround.notes);
      lines.push('');
    }
    const sectionsToDump = [
      ['MECHANICAL & LIGHTS', c.mechanical],
      ['FLUIDS', c.fluids],
    ];
    sectionsToDump.forEach(([title, bucket]) => {
      const keys = Object.keys(bucket);
      if (keys.length === 0) return;
      lines.push(title);
      keys.forEach(k => {
        const v = bucket[k];
        let line = `  - ${k}: ${v.status === 'wnl' ? 'WNL' : 'ABNORMAL'}`;
        if (v.status === 'bad') {
          if (v.fixed) line += ' (Fixed on the spot)';
          else { line += ' ⚠'; flagCount++; }
          if (v.notes) line += ` — ${v.notes}`;
        }
        lines.push(line);
      });
      lines.push('');
    });
    if (c.fuel) {
      let fl = `FUEL: ${c.fuel}`;
      if (c.fuel !== 'Full') { fl += ' ⚠ (not Full)'; flagCount++; }
      lines.push(fl);
      lines.push('');
    }
    lines.push('TIRE PRESSURES:');
    APP.data.tirePositions.forEach((pos, i) => {
      const v = c.tires[i];
      let line = `  - ${pos.label}: ${v || '—'} PSI (range ${pos.min}–${pos.max})`;
      const n = parseFloat(v);
      if (!isNaN(n) && (n < pos.min || n > pos.max)) { line += ' ⚠'; flagCount++; }
      lines.push(line);
    });
    lines.push('');
    if (Object.keys(c.electronics).length) {
      lines.push('ELECTRONICS:');
      APP.data.electronicsDevices.forEach(dev => {
        const v = c.electronics[dev.name];
        if (v === undefined) return;
        let line = `  - ${dev.name}: ${v ? 'Yes' : 'No'}`;
        if (dev.critical && !v) { line += ' ⚠ CRITICAL'; flagCount++; }
        lines.push(line);
      });
      lines.push('');
    }
    if (c.cooler.answered) {
      let line = `COOLER (4–9°C): ${c.cooler.ok ? 'Yes (WNL)' : 'No ⚠'}`;
      if (!c.cooler.ok) { flagCount++; if (c.cooler.reading) line += ` — reading: ${c.cooler.reading}°C`; }
      lines.push(line);
      lines.push('');
    }
    // Compartments
    [['EXTERIOR COMPARTMENTS', c._comps.exterior],
     ['INTERIOR COMPARTMENTS', c._comps.interior]].forEach(([title, comps]) => {
      const touched = comps.filter(comp => {
        const cs = c.compartments[comp.name];
        if (!cs) return false;
        const directTouched = Object.keys(cs.items || {}).length > 0;
        const bagTouched = (comp.bags || []).some(b => cs.bags?.[b.name] && Object.keys(cs.bags[b.name].items || {}).length > 0);
        return directTouched || bagTouched;
      });
      if (touched.length === 0) return;
      lines.push(title);
      touched.forEach(comp => {
        const cs = c.compartments[comp.name];
        const abnormal = [];
        const incomplete = [];
        // Direct items
        Object.entries(cs.items || {}).forEach(([itemName, st]) => {
          if (st.status === 'abnormal') {
            let line = `      • ${itemName}`;
            if (st.fixed) line += ' (Fixed on the spot)';
            else { flagCount++; }
            if (st.notes) line += ` — ${st.notes}`;
            abnormal.push(line);
          }
        });
        // Find direct items that weren't touched
        comp.items.forEach(it => {
          if (!cs.items?.[it.name]?.status) incomplete.push(`      • ${it.name}`);
        });
        // Bag items
        (comp.bags || []).forEach(bag => {
          const bs = cs.bags?.[bag.name];
          if (bs) {
            Object.entries(bs.items || {}).forEach(([itemName, st]) => {
              if (st.status === 'abnormal') {
                let line = `      • ${bag.name} → ${itemName}`;
                if (st.fixed) line += ' (Fixed on the spot)';
                else { flagCount++; }
                if (st.notes) line += ` — ${st.notes}`;
                abnormal.push(line);
              }
            });
          }
          bag.items.forEach(it => {
            if (!bs?.items?.[it.name]?.status) incomplete.push(`      • ${bag.name} → ${it.name}`);
          });
        });

        const totalItems = comp.items.length + (comp.bags || []).reduce((n,b) => n + b.items.length, 0);
        const completeCount = totalItems - abnormal.length - incomplete.length;
        let header = `  - ${comp.name}: ${completeCount}/${totalItems} complete`;
        if (abnormal.length) header += `, ${abnormal.length} abnormal ⚠`;
        if (incomplete.length) header += `, ${incomplete.length} not checked`;
        lines.push(header);
        if (abnormal.length) {
          lines.push(`    Abnormal:`);
          abnormal.forEach(a => lines.push(a));
          flagCount += incomplete.length; // not-checked items also count as flags
        }
        if (incomplete.length && incomplete.length <= 5) {
          lines.push(`    Not checked:`);
          incomplete.forEach(a => lines.push(a));
        } else if (incomplete.length > 5) {
          lines.push(`    Not checked: ${incomplete.length} items (see app for full list)`);
        }
      });
      lines.push('');
    });
  } else {
    // Rescue rig
    if (c.mileage) lines.push(`Mileage: ${c.mileage}`);
    lines.push('');
    const groups = ['exterior','fluids','interior','operational','cleaning'];
    const groupNames = {
      exterior: 'EXTERIOR & LIGHTS',
      fluids: 'FLUIDS & FUEL',
      interior: 'INTERIOR & EQUIPMENT',
      operational: 'OPERATIONAL',
      cleaning: 'CLEANING'
    };
    groups.forEach(group => {
      const items = APP.data.rescueRigChecks[group];
      const filled = items.filter(item => c.rescueChecks[`${group}::${item}`]?.status);
      if (filled.length === 0) return;
      lines.push(groupNames[group]);
      filled.forEach(item => {
        const v = c.rescueChecks[`${group}::${item}`];
        let line = `  - ${item}: ${v.status === 'wnl' ? 'WNL' : 'ABNORMAL'}`;
        if (v.status === 'bad') {
          if (v.fixed) line += ' (Fixed)';
          else { line += ' ⚠'; flagCount++; }
          if (v.notes) line += ` — ${v.notes}`;
        }
        lines.push(line);
      });
      lines.push('');
    });
    if (c.comments) {
      lines.push('COMMENTS:');
      lines.push(c.comments);
      lines.push('');
    }
  }

  lines.push(`Flags: ${flagCount}`);
  lines.push(`Submitted: ${new Date().toLocaleString()}`);
  return { plain: lines.join('\n'), flagCount };
}

function showSuccess(summary) {
  const c = APP.check;
  document.getElementById('success-body').innerHTML = `
    <div class="success-icon">${summary.flagCount === 0 ? '✅' : '⚠️'}</div>
    <h2>Check Submitted</h2>
    <p>Sent to ${APP.data.submissionEmail}.</p>
    <div class="success-summary">
      <div class="row"><span>Unit</span><strong>${c.unitName}</strong></div>
      <div class="row"><span>Date</span><strong>${formatDate(c.date)}</strong></div>
      <div class="row"><span>Crew</span><strong>${c.initials}</strong></div>
      <div class="row"><span>Flags</span><strong style="color:${summary.flagCount?'var(--bad)':'var(--g-mid)'}">${summary.flagCount}</strong></div>
    </div>
    <p style="font-size:13px;color:var(--muted);">If your partner completes more of the check today, both submissions will arrive separately tagged with the same unit and date.</p>
    <a class="home-link" onclick="goHome()">Back to Home</a>
  `;
  APP.check = null;
  showScreen('success');
}

/* ============================================================
   ADMIN MODE — edit inventory per ambulance, save to localStorage
   ============================================================ */
const ADMIN = {
  unitId: null,        // currently edited unit
  type: null,          // 'exterior' or 'interior'
  compIdx: null,       // index into the chosen list
  bagIdx: null,        // index of bag inside compartment, or null
  draft: null,         // mutable working copy of {exterior, interior}
};

function showAdminHome() {
  const body = document.getElementById('admin-home-body');
  body.innerHTML = '';

  const intro = document.createElement('p');
  intro.className = 'picker-intro';
  intro.textContent = 'Pick an ambulance to edit its inventory.';
  body.appendChild(intro);

  APP.data.ambulances.forEach(amb => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div>
        <div>${escapeHTML(amb.name)}</div>
        <div class="unit-meta">Edit compartments &amp; items</div>
      </div>
      <div class="unit-btn-arrow">→</div>
    `;
    btn.addEventListener('click', () => showAdminAmb(amb.id));
    body.appendChild(btn);
  });

  // Admin actions row
  const actions = document.createElement('div');
  actions.className = 'admin-actions';
  actions.style.marginTop = '24px';
  actions.innerHTML = `
    <button class="admin-btn" type="button" id="admin-export-btn">Download units.json</button>
    <button class="admin-btn danger" type="button" id="admin-clear-btn">Clear all overrides</button>
  `;
  body.appendChild(actions);
  document.getElementById('admin-export-btn').addEventListener('click', exportUnitsJson);
  document.getElementById('admin-clear-btn').addEventListener('click', clearAllOverrides);

  showScreen('admin-home');
}

function showAdminAmb(unitId) {
  // Only reset the draft if we're switching to a different ambulance
  // (so "back" from the item editor preserves in-progress edits)
  if (ADMIN.unitId !== unitId || !ADMIN.draft) {
    ADMIN.unitId = unitId;
    ADMIN.draft = JSON.parse(JSON.stringify(APP.data.ambulanceCompartments[unitId]));
  }

  document.getElementById('admin-amb-title').textContent = `Edit ${unitId}`;
  const body = document.getElementById('admin-amb-body');
  body.innerHTML = '';

  const intro = document.createElement('p');
  intro.className = 'picker-intro';
  intro.textContent = 'Pick a compartment to edit. Bags inside a compartment appear nested.';
  body.appendChild(intro);

  renderAdminCompartmentList(body, 'exterior', 'Exterior compartments');
  renderAdminCompartmentList(body, 'interior', 'Interior compartments');

  // Bottom save/discard
  const actions = document.createElement('div');
  actions.className = 'admin-actions';
  actions.style.marginTop = '24px';
  actions.innerHTML = `
    <button class="admin-btn primary" type="button" id="admin-save-btn">Save changes</button>
    <button class="admin-btn" type="button" id="admin-discard-btn">Discard</button>
  `;
  body.appendChild(actions);
  document.getElementById('admin-save-btn').addEventListener('click', () => {
    saveOverrides(ADMIN.unitId, ADMIN.draft);
    ADMIN.draft = null;  // clear so next ambulance picks fresh
    alert(`Saved changes to ${ADMIN.unitId}. They'll show up on this device immediately. Tap "Download units.json" on the admin home to share the changes with other devices.`);
    showAdminHome();
  });
  document.getElementById('admin-discard-btn').addEventListener('click', () => {
    if (confirm('Discard unsaved changes?')) {
      ADMIN.draft = null;
      showAdminHome();
    }
  });

  showScreen('admin-amb');
}

function renderAdminCompartmentList(parent, type, title) {
  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = title;
  parent.appendChild(lbl);

  const list = ADMIN.draft[type];
  list.forEach((comp, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    const bagCount = (comp.bags || []).length;
    const totalItems = comp.items.length + (comp.bags || []).reduce((n,b) => n+b.items.length, 0);
    btn.innerHTML = `
      <div>
        <div>${escapeHTML(comp.name)}</div>
        <div class="unit-meta">${totalItems} items${bagCount ? ` · ${bagCount} bag${bagCount>1?'s':''}` : ''}</div>
      </div>
      <div class="unit-btn-arrow">→</div>
    `;
    btn.style.fontSize = '17px';
    btn.style.padding = '14px 16px';
    btn.style.minHeight = '52px';
    btn.addEventListener('click', () => showAdminEdit(type, idx, null));
    parent.appendChild(btn);

    // Nested bag buttons
    (comp.bags || []).forEach((bag, bIdx) => {
      const bagBtn = document.createElement('button');
      bagBtn.type = 'button';
      bagBtn.className = 'unit-btn';
      bagBtn.style.fontSize = '15px';
      bagBtn.style.padding = '12px 14px 12px 36px';
      bagBtn.style.minHeight = '48px';
      bagBtn.innerHTML = `
        <div>
          <div>↳ ${escapeHTML(bag.name)}</div>
          <div class="unit-meta">${bag.items.length} items · inside ${escapeHTML(comp.name)}</div>
        </div>
        <div class="unit-btn-arrow">→</div>
      `;
      bagBtn.addEventListener('click', () => showAdminEdit(type, idx, bIdx));
      parent.appendChild(bagBtn);
    });
  });
}

function showAdminEdit(type, compIdx, bagIdx) {
  ADMIN.type = type;
  ADMIN.compIdx = compIdx;
  ADMIN.bagIdx = bagIdx;
  const comp = ADMIN.draft[type][compIdx];
  const target = (bagIdx === null) ? comp : comp.bags[bagIdx];
  const targetLabel = (bagIdx === null) ? comp.name : `${comp.name} → ${target.name}`;

  document.getElementById('admin-edit-title').textContent = targetLabel;
  document.getElementById('admin-edit-back').onclick = () => showAdminAmb(ADMIN.unitId);

  renderAdminEditBody(target, targetLabel);
  showScreen('admin-edit');
}

function renderAdminEditBody(target, label) {
  const body = document.getElementById('admin-edit-body');
  body.innerHTML = '';

  // Rename row
  const renameBlock = document.createElement('div');
  renameBlock.className = 'meta-block';
  renameBlock.innerHTML = `
    <div class="meta-row">
      <label>Name</label>
      <input type="text" id="admin-rename" value="${escapeAttr(target.name)}" />
    </div>
  `;
  body.appendChild(renameBlock);
  document.getElementById('admin-rename').addEventListener('input', e => {
    target.name = e.target.value;
  });

  // Items section
  const section = document.createElement('div');
  section.className = 'section';
  section.innerHTML = `<div class="section-head">Items (${target.items.length})</div>`;
  const sectionBody = document.createElement('div');
  sectionBody.style.padding = '12px 14px';
  sectionBody.id = 'admin-items-body';
  section.appendChild(sectionBody);
  body.appendChild(section);

  function renderItems() {
    sectionBody.innerHTML = '';
    target.items.forEach((it, idx) => {
      const row = document.createElement('div');
      row.className = 'edit-item-row';
      row.innerHTML = `
        <input type="text" placeholder="Item name" value="${escapeAttr(it.name)}" data-field="name" />
        <input type="number" min="1" placeholder="Qty" value="${it.qty}" data-field="qty" />
        <button type="button" class="remove-item" data-action="remove">✗</button>
      `;
      row.querySelector('[data-field="name"]').addEventListener('input', e => { it.name = e.target.value; });
      row.querySelector('[data-field="qty"]').addEventListener('input', e => { it.qty = parseInt(e.target.value) || 1; });
      row.querySelector('[data-action="remove"]').addEventListener('click', () => {
        if (confirm(`Remove "${it.name}"?`)) {
          target.items.splice(idx, 1);
          renderItems();
          // Update header count
          section.querySelector('.section-head').textContent = `Items (${target.items.length})`;
        }
      });
      sectionBody.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'add-item-btn';
    addBtn.textContent = '+ Add Item';
    addBtn.addEventListener('click', () => {
      target.items.push({ name: 'New item', qty: 1, ctrl: false });
      renderItems();
      section.querySelector('.section-head').textContent = `Items (${target.items.length})`;
    });
    sectionBody.appendChild(addBtn);
  }
  renderItems();

  const doneBlock = document.createElement('div');
  doneBlock.className = 'submit-wrap';
  doneBlock.innerHTML = `<button class="submit-btn" type="button" id="admin-edit-done">Done editing this section</button>`;
  body.appendChild(doneBlock);
  document.getElementById('admin-edit-done').addEventListener('click', () => showAdminAmb(ADMIN.unitId));
}

function exportUnitsJson() {
  // Build a fresh units.json combining the original + any overrides currently active
  const exportData = JSON.parse(JSON.stringify(APP.data));
  exportData._note = "Generated from admin mode on " + new Date().toISOString();
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'units.json';
  a.click();
  URL.revokeObjectURL(url);
  setTimeout(() => alert('Downloaded units.json. Upload this to the GitHub repo to share these changes with the whole crew.'), 50);
}

/* ============================================================
   UTILS
   ============================================================ */
function formatDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${m}/${d}/${y.slice(2)}`;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return escapeHTML(s);
}
