<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1C3A1C" />
  <title>NCEMS Apparatus Check</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --g-deep: #1C3A1C;
      --g-dark: #254D25;
      --g-mid:  #2E6B2E;
      --g-accent: #3A8A3A;
      --g-light: #C8E6C8;
      --g-pale:  #EBF5EB;
      --warn:    #B87E0A;
      --warn-bg: #FFF4E0;
      --bad:     #C13E3E;
      --bad-bg:  #FDECEC;
      --info:    #1F5C8B;
      --text:    #1A2B1A;
      --muted:   #6B7B6B;
      --bg:      #F7FAF7;
      --white:   #FFFFFF;
      --border:  #D8E6D8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    button, .unit-btn, .home-btn, .check-btn, .fuel-btn, .yn-btn, .item-btn, .mark-all-btn, .submit-btn, .back-btn, .home-link, .compartment-head, .bag-head {
      touch-action: manipulation;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overscroll-behavior-y: contain;
      -webkit-text-size-adjust: 100%;
    }
    body {
      padding-bottom: 88px;
      padding-bottom: calc(88px + env(safe-area-inset-bottom));
    }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }

    /* ============ HOME SCREEN ============ */
    .home {
      background: linear-gradient(180deg, var(--g-deep) 0%, var(--g-mid) 100%);
      color: var(--white);
      padding: 24px 20px 40px;
      padding-top: calc(24px + env(safe-area-inset-top));
      min-height: 100vh;
      text-align: center;
    }
    .home-logo {
      width: 220px;
      max-width: 60%;
      margin: 0 auto 20px;
    }
    .home-logo img { width: 100%; height: auto; display: block; }
    .home-sub {
      font-size: 14px;
      color: var(--g-light);
      font-weight: 600;
      margin: 0 0 28px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    .home-btn {
      position: relative;
      display: block;
      width: 100%;
      height: 180px;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid var(--white);
      cursor: pointer;
      background-size: cover;
      background-position: center;
      background-color: var(--g-dark);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      transition: transform 0.08s;
    }
    .home-btn:active { transform: scale(0.97); }
    .home-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(28,58,28,0.45) 0%, rgba(28,58,28,0.75) 100%);
    }
    .home-btn-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .home-btn.ambulances { background-image: url('./ambulance.jpg'); }
    .home-btn.others { background-image: url('./sar51.jpg'); }

    .home-footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--g-light);
      opacity: 0.75;
    }

    /* ============ HEADER (sub-screens) ============ */
    .header {
      background: var(--g-deep);
      color: var(--white);
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .back-btn {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 70px;
    }
    .back-btn:active { background: rgba(255,255,255,0.15); }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      flex: 1;
    }
    .header-sub {
      font-size: 12px;
      color: var(--g-light);
      font-weight: 500;
    }

    /* ============ UNIT PICKERS ============ */
    .picker-wrap {
      padding: 20px 16px;
      max-width: 560px;
      margin: 0 auto;
    }
    .picker-intro {
      font-size: 15px;
      color: var(--muted);
      margin: 4px 0 18px;
    }
    .due-banner {
      background: var(--bad);
      color: var(--white);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(193,62,62,0.3);
    }
    .unit-btn {
      width: 100%;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 22px 18px;
      font-size: 22px;
      font-weight: 700;
      color: var(--g-deep);
      text-align: left;
      cursor: pointer;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      transition: transform 0.05s;
    }
    .unit-btn:active { transform: scale(0.98); background: var(--g-pale); }
    .unit-btn.due-today {
      background: var(--bad);
      color: var(--white);
      border-color: var(--bad);
      box-shadow: 0 3px 10px rgba(193,62,62,0.25);
    }
    .unit-btn.due-today .unit-meta { color: rgba(255,255,255,0.85); }
    .unit-btn .unit-meta {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .unit-btn-arrow { font-size: 26px; opacity: 0.6; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin: 18px 0 8px;
      padding-left: 4px;
    }

    /* ============ CHECK FORM ============ */
    .form-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px 20px;
    }
    .meta-block {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 6px;
      margin-bottom: 18px;
    }
    .meta-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-row label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      min-width: 80px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .meta-row input[type="text"],
    .meta-row input[type="number"],
    .meta-row input[type="date"] {
      flex: 1;
      min-width: 0;
      padding: 12px;
      font-size: 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      font-family: inherit;
      min-height: 44px;
    }
    .meta-row input:focus {
      outline: none;
      border-color: var(--g-mid);
      background: var(--white);
    }

    .section {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-head {
      background: var(--g-pale);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--g-deep);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-body { padding: 6px 0; }

    /* WNL / Abnormal item rows */
    .check-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .check-row:last-child { border-bottom: none; }
    .check-row-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .check-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }
    .check-buttons {
      display: flex;
      gap: 6px;
    }
    .check-btn {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 64px;
      min-height: 44px;
      transition: all 0.1s;
      letter-spacing: 0.02em;
    }
    .check-btn:active { transform: scale(0.95); }
    .check-btn.wnl.active {
      background: var(--g-mid);
      color: var(--white);
      border-color: var(--g-mid);
    }
    .check-btn.bad.active {
      background: var(--warn);
      color: var(--white);
      border-color: var(--warn);
    }
    .check-detail {
      margin-top: 10px;
      padding: 10px;
      background: var(--warn-bg);
      border-radius: 8px;
      border-left: 3px solid var(--warn);
    }
    .check-detail textarea {
      width: 100%;
      min-height: 60px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      background: var(--white);
    }
    .check-detail textarea:focus {
      outline: none;
      border-color: var(--warn);
    }
    .fixed-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--info);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .fixed-check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--info);
    }
    .photo-input {
      margin-top: 8px;
      font-size: 13px;
    }
    .photo-input label {
      display: inline-block;
      padding: 8px 12px;
      background: var(--g-pale);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--g-deep);
      font-weight: 600;
      cursor: pointer;
    }
    .photo-input input[type="file"] { display: none; }
    .photo-preview {
      margin-top: 8px;
      max-width: 200px;
      max-height: 150px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* Fuel picker */
    .fuel-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 14px;
    }
    .fuel-btn {
      padding: 14px 8px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      min-height: 56px;
      color: var(--text);
      transition: all 0.1s;
    }
    .fuel-btn:active { transform: scale(0.96); }
    .fuel-btn.active {
      background: var(--warn);
      color: var(--white);
      border-color: var(--warn);
    }
    .fuel-btn.active.full {
      background: var(--g-mid);
      border-color: var(--g-mid);
    }

    /* Tire grid */
    .tire-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 14px;
    }
    .tire-cell {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    .tire-cell.bad { border-color: var(--bad); background: var(--bad-bg); }
    .tire-cell label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .tire-cell .range {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .tire-cell input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      background: var(--white);
      text-align: center;
      min-height: 44px;
    }
    .tire-cell.bad input { border-color: var(--bad); color: var(--bad); }

    /* Electronics row */
    .yn-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .yn-row:last-child { border-bottom: none; }
    .yn-row.critical-bad {
      background: var(--bad-bg);
    }
    .yn-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .crit-badge {
      background: var(--bad);
      color: var(--white);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .yn-buttons { display: flex; gap: 6px; }
    .yn-btn {
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 60px;
      min-height: 44px;
    }
    .yn-btn.yes.active { background: var(--g-mid); color: var(--white); border-color: var(--g-mid); }
    .yn-btn.no.active { background: var(--bad); color: var(--white); border-color: var(--bad); }

    /* Cooler detail */
    .cooler-detail {
      padding: 12px 14px;
      background: var(--bad-bg);
      border-top: 1px solid var(--border);
    }

    /* Compartment cards */
    .compartment-list { padding: 8px 12px; }
    .compartment-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .compartment-card.complete { border-color: var(--g-accent); }
    .compartment-card.has-flag { border-color: var(--warn); }
    .compartment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      gap: 8px;
    }
    .compartment-head-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .compartment-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--g-deep);
    }
    .compartment-counts {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .compartment-expand {
      font-size: 24px;
      color: var(--muted);
      transition: transform 0.2s;
      width: 28px;
      text-align: center;
    }
    .compartment-card.open .compartment-expand { transform: rotate(180deg); }
    .compartment-body { display: none; padding: 0 14px 14px; }
    .compartment-card.open .compartment-body { display: block; }
    .compartment-status-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .item-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-row-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .item-name {
      flex: 1;
      font-size: 15px;
      line-height: 1.3;
    }
    .item-qty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      margin-left: 6px;
    }
    .item-ctrl-badge {
      display: inline-block;
      background: var(--info);
      color: var(--white);
      font-size: 9px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      margin-left: 6px;
      vertical-align: middle;
    }
    .item-buttons { display: flex; gap: 4px; }
    .item-btn {
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
      letter-spacing: 0.02em;
    }
    .item-btn.complete.active { background: var(--g-mid); color: var(--white); border-color: var(--g-mid); }
    .item-btn.abnormal.active { background: var(--warn); color: var(--white); border-color: var(--warn); }
    .item-detail {
      margin-top: 8px;
      padding: 10px;
      background: var(--warn-bg);
      border-radius: 8px;
      border-left: 3px solid var(--warn);
    }
    .item-detail textarea {
      width: 100%;
      min-height: 50px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      background: var(--white);
    }
    .item-detail textarea:focus {
      outline: none;
      border-color: var(--warn);
    }
    .mark-all-btn {
      width: 100%;
      padding: 12px;
      background: var(--g-pale);
      border: 1px dashed var(--g-accent);
      border-radius: 8px;
      color: var(--g-deep);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .mark-all-btn:active { background: var(--g-light); }
    .mark-all-btn.active {
      background: var(--g-mid);
      color: var(--white);
      border-style: solid;
      border-color: var(--g-mid);
    }

    /* Nested bag card inside a compartment */
    .bag-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }
    .bag-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      cursor: pointer;
      gap: 8px;
      background: var(--g-pale);
    }
    .bag-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--g-deep);
    }
    .bag-icon { font-size: 12px; color: var(--muted); margin-right: 6px; }
    .bag-counts {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .bag-expand {
      font-size: 20px;
      color: var(--muted);
      transition: transform 0.15s;
      width: 24px;
      text-align: center;
    }
    .bag-card.open .bag-expand { transform: rotate(180deg); }
    .bag-body { display: none; padding: 8px 12px 12px; }
    .bag-card.open .bag-body { display: block; }
    .lazy-placeholder { padding: 10px; color: var(--muted); font-size: 13px; text-align: center; }

    /* Comments box (rescue rig) */
    .comments-box {
      padding: 14px;
    }
    .comments-box textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      resize: vertical;
      background: var(--bg);
    }

    /* Submit button */
    .submit-wrap {
      padding: 20px 14px 30px;
      text-align: center;
    }
    .submit-btn {
      background: var(--g-deep);
      color: var(--white);
      padding: 18px 28px;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      max-width: 480px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 0 4px 14px rgba(28,58,28,0.3);
      min-height: 60px;
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      background: var(--muted);
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Bottom status bar */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--g-deep);
      color: var(--white);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.25);
      z-index: 20;
      display: none;
    }
    .status-bar.visible { display: block; }
    .status-text {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-track {
      height: 8px;
      background: rgba(255,255,255,0.18);
      border-radius: 4px;
      overflow: hidden;
    }
    .status-fill {
      height: 100%;
      background: var(--g-light);
      transition: width 0.3s;
      width: 0%;
    }

    /* Success */
    .success {
      text-align: center;
      padding: 60px 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }
    .success h2 {
      font-size: 24px;
      color: var(--g-deep);
      margin: 0 0 8px;
    }
    .success p {
      color: var(--muted);
      margin: 8px 0;
    }
    .success-summary {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .success-summary .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .success-summary .row:last-child { border-bottom: none; }
    .success-summary .row strong { color: var(--g-deep); }
    .home-link {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 24px;
      background: var(--g-deep);
      color: var(--white);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 14px;
    }

    /* Loading / error */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .error-box {
      background: var(--bad-bg);
      border: 1.5px solid var(--bad);
      border-radius: 10px;
      padding: 14px;
      margin: 14px;
      color: var(--bad);
      font-size: 14px;
    }

    @media (min-width: 600px) {
      .home-buttons { flex-direction: row; }
      .home-btn { height: 220px; }
      .tire-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ============ ADMIN MODE ============ */
    .admin-banner {
      background: var(--info);
      color: var(--white);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
    }
    .admin-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .admin-btn {
      flex: 1;
      min-width: 130px;
      padding: 12px;
      background: var(--white);
      border: 1.5px solid var(--info);
      color: var(--info);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      min-height: 44px;
    }
    .admin-btn:active { background: var(--g-pale); }
    .admin-btn.primary { background: var(--info); color: var(--white); }
    .admin-btn.danger { border-color: var(--bad); color: var(--bad); }
    .admin-btn.danger.primary { background: var(--bad); color: var(--white); }

    .edit-item-row {
      display: grid;
      grid-template-columns: 1fr 80px auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .edit-item-row input {
      padding: 8px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      min-height: 36px;
    }
    .edit-item-row .remove-item {
      padding: 6px 10px;
      background: var(--bad-bg);
      color: var(--bad);
      border: 1px solid var(--bad);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
    }
    .add-item-btn {
      width: 100%;
      padding: 10px;
      background: var(--white);
      border: 1.5px dashed var(--g-accent);
      color: var(--g-deep);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.04em;
    }
    .password-prompt {
      max-width: 320px;
      margin: 60px auto;
      padding: 24px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .password-prompt h2 {
      color: var(--g-deep);
      margin: 0 0 12px;
      font-size: 18px;
    }
    .password-prompt input {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      letter-spacing: 0.5em;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .password-prompt button {
      width: 100%;
      padding: 14px;
      background: var(--g-deep);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- ============ HOME SCREEN ============ -->
<div class="screen home active" id="screen-home">
  <div class="home-logo"><img src="./logo.png" alt="North Country EMS" /></div>
  <div class="home-sub">Daily Apparatus Check</div>
  <div class="home-buttons">
    <button class="home-btn ambulances" id="home-btn-ambulances" type="button">
      <div class="home-btn-label">Ambulances</div>
    </button>
    <button class="home-btn others" id="home-btn-others" type="button">
      <div class="home-btn-label">Other Units</div>
    </button>
  </div>
  <div class="home-footer">v<span id="version-tag">2.1.0</span> · <span id="today-date"></span></div>
</div>

<!-- ============ AMBULANCE PICKER ============ -->
<div class="screen" id="screen-ambulance-picker">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="header-title">Pick an Ambulance</div>
  </div>
  <div class="picker-wrap" id="ambulance-picker-list"></div>
</div>

<!-- ============ RESCUE PICKER ============ -->
<div class="screen" id="screen-rescue-picker">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="header-title">Pick a Rescue Unit</div>
  </div>
  <div class="picker-wrap" id="rescue-picker-list"></div>
</div>

<!-- ============ CHECK FORM ============ -->
<div class="screen" id="screen-check">
  <div class="header">
    <button class="back-btn" onclick="confirmExitCheck()">← Back</button>
    <div class="header-title" id="check-title">Check</div>
  </div>
  <div class="form-wrap" id="check-body"></div>
</div>

<!-- ============ SUCCESS ============ -->
<div class="screen" id="screen-success">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="header-title">Submitted</div>
  </div>
  <div class="success" id="success-body"></div>
</div>

<!-- ============ ADMIN ============ -->
<div class="screen" id="screen-admin-login">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="header-title">Admin Login</div>
  </div>
  <div class="password-prompt">
    <h2>Enter admin password</h2>
    <input type="password" id="admin-pw" inputmode="numeric" autocomplete="off" maxlength="20" />
    <button id="admin-pw-submit" type="button">Unlock</button>
    <p id="admin-pw-error" style="color:var(--bad);font-size:13px;margin-top:10px;display:none;">Wrong password.</p>
  </div>
</div>

<div class="screen" id="screen-admin-home">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Done</button>
    <div class="header-title">Admin · Edit Inventory</div>
  </div>
  <div class="admin-banner">⚙ Admin mode — changes persist on this device</div>
  <div class="picker-wrap" id="admin-home-body"></div>
</div>

<div class="screen" id="screen-admin-amb">
  <div class="header">
    <button class="back-btn" onclick="showAdminHome()">← Admin</button>
    <div class="header-title" id="admin-amb-title">Edit ambulance</div>
  </div>
  <div class="admin-banner">⚙ Admin mode</div>
  <div class="picker-wrap" id="admin-amb-body"></div>
</div>

<div class="screen" id="screen-admin-edit">
  <div class="header">
    <button class="back-btn" id="admin-edit-back">← Back</button>
    <div class="header-title" id="admin-edit-title">Edit compartment</div>
  </div>
  <div class="admin-banner">⚙ Admin mode</div>
  <div class="form-wrap" id="admin-edit-body"></div>
</div>

<!-- ============ STATUS BAR ============ -->
<div class="status-bar" id="status-bar">
  <div class="status-text">
    <span id="status-label">Check is 0% complete</span>
    <span id="status-flags"></span>
  </div>
  <div class="status-track"><div class="status-fill" id="status-fill"></div></div>
</div>

<script>
'use strict';

/* ============================================================
   APP STATE
   ============================================================ */
const APP = {
  version: '2.0.0',
  data: null,        // loaded units.json
  screen: 'home',
  check: null,       // current in-progress check
};

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ============================================================
   BOOT
   ============================================================ */
window.addEventListener('DOMContentLoaded', boot);

async function boot() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  // Wire up home buttons via addEventListener (robust on mobile)
  document.getElementById('home-btn-ambulances').addEventListener('click', showAmbulancePicker);
  document.getElementById('home-btn-others').addEventListener('click', showRescuePicker);

  // Wire up the 5-tap admin entry on the version footer
  setupAdminTrigger();

  // Wire up admin password submit
  document.getElementById('admin-pw-submit').addEventListener('click', tryUnlockAdmin);
  document.getElementById('admin-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryUnlockAdmin();
  });

  try {
    const res = await fetch(`./units.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Failed to load units.json: ${res.status}`);
    APP.data = await res.json();
    document.getElementById('version-tag').textContent = APP.data.version || APP.version;

    // Overlay any admin edits from localStorage on top of the base data
    applyOverrides();

    // Initialize EmailJS
    if (APP.data.emailjs && APP.data.emailjs.publicKey && window.emailjs) {
      emailjs.init({ publicKey: APP.data.emailjs.publicKey });
    }
  } catch (err) {
    document.body.insertAdjacentHTML('afterbegin',
      `<div class="error-box">Failed to load units.json: ${err.message}. Check that units.json is uploaded next to index.html.</div>`);
    console.error(err);
  }
}

function applyOverrides() {
  try {
    const raw = localStorage.getItem('wamboapp_overrides_v1');
    if (!raw) return;
    const overrides = JSON.parse(raw);
    if (overrides.ambulanceCompartments) {
      // Replace per-unit overrides (admin saves whole compartments structure per unit)
      Object.keys(overrides.ambulanceCompartments).forEach(unitId => {
        APP.data.ambulanceCompartments[unitId] = overrides.ambulanceCompartments[unitId];
      });
      console.log('Loaded admin overrides for:', Object.keys(overrides.ambulanceCompartments));
    }
  } catch (err) {
    console.warn('Failed to apply overrides:', err);
  }
}

function saveOverrides(unitId, compartments) {
  let overrides = {};
  try {
    const raw = localStorage.getItem('wamboapp_overrides_v1');
    if (raw) overrides = JSON.parse(raw);
  } catch (e) {}
  overrides.ambulanceCompartments = overrides.ambulanceCompartments || {};
  overrides.ambulanceCompartments[unitId] = compartments;
  localStorage.setItem('wamboapp_overrides_v1', JSON.stringify(overrides));
  // Update in-memory copy too
  APP.data.ambulanceCompartments[unitId] = compartments;
}

function clearAllOverrides() {
  if (!confirm('Clear ALL admin edits on this device? Inventory will reset to whatever is in units.json on the server. This cannot be undone.')) return;
  localStorage.removeItem('wamboapp_overrides_v1');
  alert('Cleared. Reload the page to see the original inventory.');
}

/* ============================================================
   ADMIN TRIGGER (5 taps on version footer)
   ============================================================ */
let _adminTapCount = 0;
let _adminTapTimer = null;
function setupAdminTrigger() {
  const footer = document.querySelector('.home-footer');
  if (!footer) return;
  footer.style.cursor = 'pointer';
  footer.addEventListener('click', () => {
    _adminTapCount++;
    clearTimeout(_adminTapTimer);
    _adminTapTimer = setTimeout(() => { _adminTapCount = 0; }, 1500);
    if (_adminTapCount >= 5) {
      _adminTapCount = 0;
      document.getElementById('admin-pw').value = '';
      document.getElementById('admin-pw-error').style.display = 'none';
      showScreen('admin-login');
      setTimeout(() => document.getElementById('admin-pw').focus(), 100);
    }
  });
}

function tryUnlockAdmin() {
  const pw = document.getElementById('admin-pw').value.trim();
  if (pw === '4321') {
    document.getElementById('admin-pw').value = '';
    showAdminHome();
  } else {
    document.getElementById('admin-pw-error').style.display = 'block';
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
  APP.screen = id;
  document.getElementById('status-bar').classList.toggle('visible', id === 'check');
}

function goHome() {
  if (APP.screen === 'check' && hasUnsavedWork()) {
    if (!confirm('You have unsaved work. Discard and go back to home?')) return;
  }
  APP.check = null;
  showScreen('home');
}

function confirmExitCheck() {
  if (hasUnsavedWork()) {
    if (!confirm('You have unsaved work. Discard and go back?')) return;
  }
  APP.check = null;
  showScreen('home');
}

function hasUnsavedWork() {
  if (!APP.check) return false;
  const c = APP.check;
  return !!(c.initials || c.mileage || c.walkAround?.notes ||
            Object.keys(c.mechanical || {}).length ||
            Object.keys(c.fluids || {}).length ||
            c.fuel || (c.tires && c.tires.some(t => t)) ||
            Object.keys(c.electronics || {}).length ||
            c.cooler?.answered ||
            Object.keys(c.compartments || {}).length ||
            Object.keys(c.rescueChecks || {}).length ||
            c.comments);
}

/* ============================================================
   AMBULANCE PICKER
   ============================================================ */
function showAmbulancePicker() {
  const list = document.getElementById('ambulance-picker-list');
  list.innerHTML = '';
  const intro = document.createElement('p');
  intro.className = 'picker-intro';
  intro.textContent = "Pick the ambulance you're checking today.";
  list.appendChild(intro);

  APP.data.ambulances.forEach(amb => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div>
        <div>${escapeHTML(amb.name)}</div>
        <div class="unit-meta">${escapeHTML(amb.type)}</div>
      </div>
      <div class="unit-btn-arrow">→</div>
    `;
    btn.addEventListener('click', () => startAmbulanceCheck(amb.id));
    list.appendChild(btn);
  });
  showScreen('ambulance-picker');
}

/* ============================================================
   RESCUE PICKER (with day-of-week rotation)
   ============================================================ */
function showRescuePicker() {
  const list = document.getElementById('rescue-picker-list');
  const today = DAY_NAMES[new Date().getDay()];
  const dueToday = APP.data.rescueRotation[today] || [];
  const allRescue = APP.data.allRescueUnits;
  const rest = allRescue.filter(u => !dueToday.includes(u));

  list.innerHTML = '';

  if (dueToday.length > 0) {
    const banner = document.createElement('div');
    banner.className = 'due-banner';
    banner.textContent = `Due Today (${today}): ${dueToday.join(', ')}`;
    list.appendChild(banner);

    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = `Scheduled for ${today}`;
    list.appendChild(lbl);

    dueToday.forEach(u => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'unit-btn due-today';
      btn.innerHTML = `
        <div>
          <div>${escapeHTML(u)}</div>
          <div class="unit-meta">Due today</div>
        </div>
        <div class="unit-btn-arrow">→</div>
      `;
      btn.addEventListener('click', () => startRescueCheck(u));
      list.appendChild(btn);
    });

    const lbl2 = document.createElement('div');
    lbl2.className = 'section-label';
    lbl2.textContent = 'Other rescue units';
    list.appendChild(lbl2);
  } else {
    const intro = document.createElement('p');
    intro.className = 'picker-intro';
    intro.textContent = `No rigs scheduled for ${today}. Pick any unit to run a check.`;
    list.appendChild(intro);
  }

  rest.forEach(u => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div>
        <div>${escapeHTML(u)}</div>
        <div class="unit-meta">Optional</div>
      </div>
      <div class="unit-btn-arrow">→</div>
    `;
    btn.addEventListener('click', () => startRescueCheck(u));
    list.appendChild(btn);
  });

  showScreen('rescue-picker');
}

/* ============================================================
   START AMBULANCE CHECK
   ============================================================ */
function startAmbulanceCheck(unitId) {
  const amb = APP.data.ambulances.find(a => a.id === unitId);
  if (!amb) return;
  const comps = APP.data.ambulanceCompartments[unitId];
  if (!comps) {
    alert(`No compartment data for ${unitId}. Check units.json.`);
    return;
  }
  APP.check = {
    type: 'ambulance',
    unitId,
    unitName: amb.name,
    date: new Date().toISOString().slice(0,10),
    initials: '',
    mileage: '',
    walkAround: { notes: '', photo: null },
    mechanical: {},
    fluids: {},
    fuel: null,
    tires: ['','','','','',''],
    electronics: {},
    cooler: { answered: false, ok: null, reading: '', photo: null },
    // compartments: { compName: { items: {itemName: {status, notes, fixed}}, bags: { bagName: { items: {...} } } } }
    compartments: {},
    _comps: comps,
  };
  renderAmbulanceCheck();
  showScreen('check');
  updateProgress();
}

function renderAmbulanceCheck() {
  const c = APP.check;
  document.getElementById('check-title').innerHTML =
    `${c.unitName} <span class="header-sub">· ${formatDate(c.date)}</span>`;

  const body = document.getElementById('check-body');
  body.innerHTML = `
    ${renderMetaBlock()}
    ${renderWalkAroundSection()}
    ${renderMechanicalSection()}
    ${renderFluidsSection()}
    ${renderFuelSection()}
    ${renderTireSection()}
    ${renderElectronicsSection()}
    ${renderCoolerSection()}
    ${renderCompartmentSection('Exterior Compartments', 'exterior', c._comps.exterior)}
    ${renderCompartmentSection('Interior Compartments', 'interior', c._comps.interior)}
    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitCheck()">Submit Check</button>
    </div>
  `;
  attachAmbulanceHandlers();
}

/* ============================================================
   START RESCUE CHECK
   ============================================================ */
function startRescueCheck(unitName) {
  APP.check = {
    type: 'rescue',
    unitId: unitName,
    unitName: unitName,
    date: new Date().toISOString().slice(0,10),
    initials: '',
    mileage: '',
    rescueChecks: {},
    comments: '',
  };
  renderRescueCheck();
  showScreen('check');
  updateProgress();
}

function renderRescueCheck() {
  const c = APP.check;
  document.getElementById('check-title').innerHTML =
    `${c.unitName} <span class="header-sub">· ${formatDate(c.date)}</span>`;
  const checks = APP.data.rescueRigChecks;
  const body = document.getElementById('check-body');

  body.innerHTML = `
    <div class="meta-block">
      <div class="meta-row">
        <label>Initials</label>
        <input type="text" id="rescue-initials" placeholder="e.g. DB" maxlength="6" />
      </div>
      <div class="meta-row">
        <label>Mileage</label>
        <input type="number" id="rescue-mileage" placeholder="Current mileage" />
      </div>
    </div>
    ${renderRescueGroup('Exterior & Lights', 'exterior', checks.exterior)}
    ${renderRescueGroup('Fluids & Fuel', 'fluids', checks.fluids)}
    ${renderRescueGroup('Interior & Equipment', 'interior', checks.interior)}
    ${renderRescueGroup('Operational', 'operational', checks.operational)}
    ${renderRescueGroup('Cleaning', 'cleaning', checks.cleaning)}
    <div class="section">
      <div class="section-head">Comments</div>
      <div class="comments-body comments-box">
        <textarea id="rescue-comments" placeholder="Any notes, deficiencies, or observations..."></textarea>
      </div>
    </div>
    <div class="submit-wrap">
      <button class="submit-btn" onclick="submitCheck()">Submit Check</button>
    </div>
  `;
  attachRescueHandlers();
}

function renderRescueGroup(title, group, items) {
  let html = `<div class="section"><div class="section-head">${title}</div><div class="section-body">`;
  items.forEach(item => {
    const key = `${group}::${item}`;
    html += renderWNLRow(item, key, 'rescueChecks');
  });
  html += `</div></div>`;
  return html;
}

function attachRescueHandlers() {
  document.getElementById('rescue-initials').oninput = e => { APP.check.initials = e.target.value; updateProgress(); };
  document.getElementById('rescue-mileage').oninput = e => { APP.check.mileage = e.target.value; updateProgress(); };
  document.getElementById('rescue-comments').oninput = e => { APP.check.comments = e.target.value; };

  // Wire up the WNL rows for the rescue check
  document.querySelectorAll('.check-row[data-bucket="rescueChecks"]').forEach(row => {
    const key = row.dataset.key;
    const safeKey = key.replace(/[^a-zA-Z0-9]/g, '_');
    row.querySelectorAll('.check-btn').forEach(btn => {
      btn.onclick = () => {
        const status = btn.dataset.status;
        row.querySelectorAll('.check-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check.rescueChecks[key] = APP.check.rescueChecks[key] || {};
        APP.check.rescueChecks[key].status = status;
        document.getElementById('detail-' + safeKey).style.display = status === 'bad' ? 'block' : 'none';
        updateProgress();
      };
    });
    const detail = document.getElementById('detail-' + safeKey);
    detail.querySelector('textarea').oninput = e => {
      APP.check.rescueChecks[key] = APP.check.rescueChecks[key] || {};
      APP.check.rescueChecks[key].notes = e.target.value;
    };
    detail.querySelector('[data-fixed]').onchange = e => {
      APP.check.rescueChecks[key] = APP.check.rescueChecks[key] || {};
      APP.check.rescueChecks[key].fixed = e.target.checked;
    };
  });
}

/* ============================================================
   RENDERERS (ambulance form sections)
   ============================================================ */
function renderMetaBlock() {
  return `
    <div class="meta-block">
      <div class="meta-row">
        <label>Initials</label>
        <input type="text" id="meta-initials" placeholder="e.g. DB" maxlength="6" />
      </div>
      <div class="meta-row">
        <label>Mileage</label>
        <input type="number" id="meta-mileage" placeholder="Starting mileage" />
      </div>
    </div>
  `;
}

function renderWalkAroundSection() {
  return `
    <div class="section">

/* Lazy-render a compartment's body the first time it's opened. */
function renderCompartmentBody(safeId, comp) {
  const body = document.getElementById('comp-body-' + safeId);
  if (!body || body.dataset.rendered === 'true') return;
  body.dataset.rendered = 'true';

  let html = '';
  // Mark All Complete (covers direct items + all nested bag items)
  html += `<button class="mark-all-btn" type="button" data-mark-all="${escapeAttr(comp.name)}">Mark All Complete</button>`;

  // Direct items in the compartment
  if (comp.items.length > 0) {
    html += `<div class="item-list" data-bag-name="">`;
    comp.items.forEach((it, itIdx) => {
      html += itemRowHTML(it, comp.name, '', itIdx);
    });
    html += `</div>`;
  }

  // Nested bags
  if (comp.bags && comp.bags.length > 0) {
    comp.bags.forEach((bag, bIdx) => {
      const bagSafeId = `${safeId}-bag-${bIdx}`;
      html += `
        <div class="bag-card" id="bag-${bagSafeId}" data-bag-name="${escapeAttr(bag.name)}">
          <div class="bag-head" data-bag-toggle="${bagSafeId}">
            <div>
              <div class="bag-name"><span class="bag-icon">▸</span>${escapeHTML(bag.name)}</div>
              <div class="bag-counts">${bag.items.length} items</div>
            </div>
            <div class="bag-expand">▼</div>
          </div>
          <div class="bag-body">
            <button class="mark-all-btn" type="button" data-mark-all="${escapeAttr(comp.name)}" data-mark-bag="${escapeAttr(bag.name)}">Mark All Complete</button>
            <div class="item-list" data-bag-name="${escapeAttr(bag.name)}">
              ${bag.items.map((it, itIdx) => itemRowHTML(it, comp.name, bag.name, itIdx)).join('')}
            </div>
          </div>
        </div>`;
    });
  }

  body.innerHTML = html;
  wireCompartmentBody(safeId, comp);
}

function itemRowHTML(it, compName, bagName, idx) {
  return `
    <div class="item-row" data-comp="${escapeAttr(compName)}" data-bag="${escapeAttr(bagName)}" data-item="${escapeAttr(it.name)}">
      <div class="item-row-main">

          ${escapeHTML(it.name)}
          <span class="item-qty">×${it.qty}</span>
          ${it.ctrl ? '<span class="item-ctrl-badge">CTRL</span>' : ''}
        </div>
        <div class="item-buttons">
          <button class="item-btn complete" type="button" data-item-status="complete">✓</button>
          <button class="item-btn abnormal" type="button" data-item-status="abnormal">✗</button>
        </div>
      </div>
      <div class="item-detail" style="display:none;">
        <textarea placeholder="What's wrong with this item?"></textarea>
        <label class="fixed-check">
          <input type="checkbox" data-fixed />
          Fixed on the spot
        </label>
      </div>
    </div>
  `;

function wireCompartmentBody(safeId, comp) {
  const body = document.getElementById('comp-body-' + safeId);
  if (!body) return;

  // Mark-all-complete buttons (compartment-level and bag-level)
  body.querySelectorAll('[data-mark-all]').forEach(btn => {
    btn.addEventListener('click', () => {
      const compName = btn.dataset.markAll;
      const bagName = btn.dataset.markBag || '';
      markAllItemsAsComplete(safeId, compName, bagName, btn);
    });
  });

  // Bag expand/collapse
  body.querySelectorAll('[data-bag-toggle]').forEach(head => {
    head.addEventListener('click', () => {
      const bagId = head.dataset.bagToggle;
      document.getElementById('bag-' + bagId).classList.toggle('open');
    });
  });

  // Item buttons (complete / abnormal)
  body.querySelectorAll('.item-row').forEach(row => {
    const compName = row.dataset.comp;
    const bagName = row.dataset.bag;
    const itemName = row.dataset.item;
    const detail = row.querySelector('.item-detail');
    const textarea = detail.querySelector('textarea');
    const fixedBox = detail.querySelector('[data-fixed]');

    row.querySelectorAll('.item-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const status = btn.dataset.itemStatus;
        row.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const state = ensureItemState(compName, bagName, itemName);
        state.status = status;
        detail.style.display = (status === 'abnormal') ? 'block' : 'none';
        updateCompartmentCounts(safeId, comp);
        updateProgress();
      });
    });
    textarea.addEventListener('input', e => {
      const state = ensureItemState(compName, bagName, itemName);
      state.notes = e.target.value;
    });
    fixedBox.addEventListener('change', e => {
      const state = ensureItemState(compName, bagName, itemName);
      state.fixed = e.target.checked;
      updateProgress();
    });
  });
}

function ensureItemState(compName, bagName, itemName) {
  const c = APP.check;
  c.compartments[compName] = c.compartments[compName] || { items: {}, bags: {} };
  if (bagName) {
    c.compartments[compName].bags[bagName] = c.compartments[compName].bags[bagName] || { items: {} };
    c.compartments[compName].bags[bagName].items[itemName] = c.compartments[compName].bags[bagName].items[itemName] || { status: null, notes: '', fixed: false };
    return c.compartments[compName].bags[bagName].items[itemName];
  } else {
    c.compartments[compName].items[itemName] = c.compartments[compName].items[itemName] || { status: null, notes: '', fixed: false };
    return c.compartments[compName].items[itemName];
  }
}

function markAllItemsAsComplete(safeId, compName, bagName, btn) {
  const body = document.getElementById('comp-body-' + safeId);
  // Find item rows matching the bag scope
  const selector = bagName
    ? `.item-row[data-bag="${cssEscape(bagName)}"]`
    : `.item-row[data-bag=""]`;
  body.querySelectorAll(selector).forEach(row => {
    const itemName = row.dataset.item;
    row.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
    row.querySelector('.item-btn.complete').classList.add('active');
    row.querySelector('.item-detail').style.display = 'none';
    const state = ensureItemState(compName, bagName, itemName);
    state.status = 'complete';
    state.notes = '';
    state.fixed = false;
    // Reset textarea + checkbox visually
    row.querySelector('textarea').value = '';
    row.querySelector('[data-fixed]').checked = false;
  });
  // Mark the button visually so the user knows it was applied
  if (btn) {
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 400);
  }
  // Find the compartment so we can update counts
  const card = document.getElementById('comp-' + safeId);
  const compData = findCompartmentByName(card.dataset.compartment);
  if (compData) updateCompartmentCounts(safeId, compData);
  updateProgress();
}

function findCompartmentByName(name) {
  const c = APP.check;
  if (!c || !c._comps) return null;
  return [...c._comps.exterior, ...c._comps.interior].find(co => co.name === name);
}

function updateCompartmentCounts(safeId, comp) {
  const counts = document.getElementById('comp-counts-' + safeId);
  if (!counts) return;
  const compState = APP.check.compartments[comp.name];
  if (!compState) return;
  // Tally direct + bag items
  let touched = 0, complete = 0, abnormal = 0, total = comp.items.length;
  Object.values(compState.items || {}).forEach(it => {
    if (it.status) touched++;
    if (it.status === 'complete') complete++;
    if (it.status === 'abnormal') abnormal++;
  });
  (comp.bags || []).forEach(bag => {
    total += bag.items.length;
    const bagState = compState.bags?.[bag.name];
    if (bagState) {
      Object.values(bagState.items || {}).forEach(it => {
        if (it.status) touched++;
        if (it.status === 'complete') complete++;
        if (it.status === 'abnormal') abnormal++;
      });
    }
  });
  if (touched === 0) {
    const bagSummary = (comp.bags && comp.bags.length) ? ` · ${comp.bags.length} bag${comp.bags.length>1?'s':''} inside` : '';
    counts.textContent = `${total} item${total!==1?'s':''}${bagSummary}`;
  } else {
    counts.textContent = `${complete} ✓ · ${abnormal} ✗ · ${total} total`;
  }
  // Card border color
  const card = document.getElementById('comp-' + safeId);
  card.classList.toggle('has-flag', abnormal > 0);
  card.classList.toggle('complete', complete === total && total > 0);
}

function cssEscape(s) {
  return String(s).replace(/(["\\])/g, '\\$1');
}

/* ============================================================
   HANDLERS (ambulance check)
   ============================================================ */
function attachAmbulanceHandlers() {
  document.getElementById('meta-initials').oninput = e => { APP.check.initials = e.target.value; updateProgress(); };
  document.getElementById('meta-mileage').oninput = e => { APP.check.mileage = e.target.value; updateProgress(); };
  document.getElementById('walkaround-notes').oninput = e => { APP.check.walkAround.notes = e.target.value; };
  document.getElementById('walkaround-photo').onchange = e => handlePhoto(e, 'walkAround', 'walkaround-photo-preview');

  // WNL rows (mechanical, fluids) - filter to only rows with data-key
  // (walk-around uses .check-row class too but has no data-key)
  document.querySelectorAll('.check-row[data-key]').forEach(row => {
    const key = row.dataset.key;
    const bucket = row.dataset.bucket;
    const safeKey = key.replace(/[^a-zA-Z0-9]/g, '_');
    row.querySelectorAll('.check-btn').forEach(btn => {
      btn.onclick = () => {
        const status = btn.dataset.status;
        row.querySelectorAll('.check-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check[bucket][key] = APP.check[bucket][key] || {};
        APP.check[bucket][key].status = status;
        document.getElementById('detail-' + safeKey).style.display = status === 'bad' ? 'block' : 'none';
        updateProgress();
      };
    });
    const detail = document.getElementById('detail-' + safeKey);
    detail.querySelector('textarea').oninput = e => {
      APP.check[bucket][key] = APP.check[bucket][key] || {};
      APP.check[bucket][key].notes = e.target.value;
    };
    detail.querySelector('[data-fixed]').onchange = e => {
      APP.check[bucket][key] = APP.check[bucket][key] || {};
      APP.check[bucket][key].fixed = e.target.checked;
    };
  });

  // Fuel
  document.querySelectorAll('.fuel-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      APP.check.fuel = btn.dataset.fuel;
      updateProgress();
    };
  });

  // Tires
  document.querySelectorAll('[data-tire]').forEach(input => {
    input.oninput = e => {
      const idx = parseInt(e.target.dataset.tire);
      APP.check.tires[idx] = e.target.value;
      const min = parseFloat(e.target.dataset.min);
      const max = parseFloat(e.target.dataset.max);
      const v = parseFloat(e.target.value);
      const cell = document.getElementById('tire-cell-' + idx);
      if (!isNaN(v) && (v < min || v > max)) cell.classList.add('bad');
      else cell.classList.remove('bad');
      updateProgress();
    };
  });

  // Electronics
  document.querySelectorAll('[data-device]').forEach(row => {
    const dev = row.dataset.device;
    const critical = row.dataset.critical === 'true';
    row.querySelectorAll('.yn-btn').forEach(btn => {
      btn.onclick = () => {
        const val = btn.dataset.yn;
        row.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check.electronics[dev] = val === 'yes';
        row.classList.toggle('critical-bad', critical && val === 'no');
        updateProgress();
      };
    });
  });

  // Cooler
  document.querySelectorAll('[data-cooler-yn]').forEach(btn => {
    btn.onclick = () => {
      const val = btn.dataset.coolerYn;
      document.querySelectorAll('[data-cooler-yn]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      APP.check.cooler.answered = true;
      APP.check.cooler.ok = val === 'yes';
      document.getElementById('cooler-detail').style.display = val === 'no' ? 'block' : 'none';
      updateProgress();
    };
  });
  document.getElementById('cooler-reading').oninput = e => { APP.check.cooler.reading = e.target.value; };
  document.getElementById('cooler-photo').onchange = e => handlePhoto(e, 'cooler', 'cooler-photo-preview');

  // Compartments — lazy render on first expand
  document.querySelectorAll('.compartment-head[data-comp-toggle]').forEach(head => {
    head.addEventListener('click', () => {
      const safeId = head.dataset.compToggle;
      const card = document.getElementById('comp-' + safeId);
      const compName = card.dataset.compartment;
      const comp = findCompartmentByName(compName);
      if (comp && !card.classList.contains('open')) {
        renderCompartmentBody(safeId, comp);
      }
      card.classList.toggle('open');
    });
  });
}
