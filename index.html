<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1C3A1C" />
  <title>NCEMS Apparatus Check</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --g-deep: #1C3A1C;
      --g-dark: #254D25;
      --g-mid:  #2E6B2E;
      --g-accent: #3A8A3A;
      --g-light: #C8E6C8;
      --g-pale:  #EBF5EB;
      --warn:    #B87E0A;
      --warn-bg: #FFF4E0;
      --bad:     #C13E3E;
      --bad-bg:  #FDECEC;
      --info:    #1F5C8B;
      --text:    #1A2B1A;
      --muted:   #6B7B6B;
      --bg:      #F7FAF7;
      --white:   #FFFFFF;
      --border:  #D8E6D8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overscroll-behavior-y: contain;
    }
    body {
      padding-bottom: 88px; /* room for status bar + safe area */
      padding-bottom: calc(88px + env(safe-area-inset-bottom));
    }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }

    /* ============ HOME SCREEN ============ */
    .home {
      background: linear-gradient(180deg, var(--g-deep) 0%, var(--g-mid) 100%);
      color: var(--white);
      padding: 32px 20px 40px;
      min-height: 100vh;
      text-align: center;
    }
    .home-logo {
      width: 160px;
      height: 160px;
      margin: 8px auto 16px;
    }
    .home-logo img { width: 100%; height: 100%; display: block; }
    .home-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin: 12px 0 4px;
      text-transform: uppercase;
    }
    .home-sub {
      font-size: 15px;
      color: var(--g-light);
      font-weight: 500;
      margin: 0 0 28px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    .home-btn {
      position: relative;
      display: block;
      width: 100%;
      height: 180px;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid var(--white);
      cursor: pointer;
      background-size: cover;
      background-position: center;
      background-color: var(--g-dark);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .home-btn:active { transform: scale(0.98); box-shadow: 0 3px 10px rgba(0,0,0,0.3); }
    .home-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(28,58,28,0.45) 0%, rgba(28,58,28,0.75) 100%);
    }
    .home-btn-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .home-btn.ambulances { background-image: url('./ambulance.jpg'); }
    .home-btn.others { background-image: url('./sar51.jpg'); }

    .home-footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--g-light);
      opacity: 0.75;
    }

    /* ============ HEADER (sub-screens) ============ */
    .header {
      background: var(--g-deep);
      color: var(--white);
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .back-btn {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 70px;
    }
    .back-btn:active { background: rgba(255,255,255,0.15); }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      flex: 1;
    }
    .header-sub {
      font-size: 12px;
      color: var(--g-light);
      font-weight: 500;
    }

    /* ============ UNIT PICKERS ============ */
    .picker-wrap {
      padding: 20px 16px;
      max-width: 560px;
      margin: 0 auto;
    }
    .picker-intro {
      font-size: 15px;
      color: var(--muted);
      margin: 4px 0 18px;
    }
    .due-banner {
      background: var(--bad);
      color: var(--white);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(193,62,62,0.3);
    }
    .unit-btn {
      width: 100%;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 22px 18px;
      font-size: 22px;
      font-weight: 700;
      color: var(--g-deep);
      text-align: left;
      cursor: pointer;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      transition: transform 0.1s, background 0.1s;
    }
    .unit-btn:active { transform: scale(0.98); background: var(--g-pale); }
    .unit-btn.due-today {
      background: var(--bad);
      color: var(--white);
      border-color: var(--bad);
      box-shadow: 0 3px 10px rgba(193,62,62,0.25);
    }
    .unit-btn.due-today .unit-meta { color: rgba(255,255,255,0.85); }
    .unit-btn .unit-meta {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .unit-btn-arrow { font-size: 26px; opacity: 0.6; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin: 18px 0 8px;
      padding-left: 4px;
    }

    /* ============ CHECK FORM ============ */
    .form-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px 20px;
    }
    .meta-block {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 6px;
      margin-bottom: 18px;
    }
    .meta-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-row label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      min-width: 80px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .meta-row input[type="text"],
    .meta-row input[type="number"],
    .meta-row input[type="date"] {
      flex: 1;
      min-width: 0;
      padding: 12px;
      font-size: 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      font-family: inherit;
      min-height: 44px;
    }
    .meta-row input:focus {
      outline: none;
      border-color: var(--g-mid);
      background: var(--white);
    }

    .section {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-head {
      background: var(--g-pale);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--g-deep);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-body { padding: 6px 0; }

    /* WNL / Abnormal item rows */
    .check-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .check-row:last-child { border-bottom: none; }
    .check-row-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .check-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }
    .check-buttons {
      display: flex;
      gap: 6px;
    }
    .check-btn {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 64px;
      min-height: 44px;
      transition: all 0.1s;
      letter-spacing: 0.02em;
    }
    .check-btn:active { transform: scale(0.95); }
    .check-btn.wnl.active {
      background: var(--g-mid);
      color: var(--white);
      border-color: var(--g-mid);
    }
    .check-btn.bad.active {
      background: var(--warn);
      color: var(--white);
      border-color: var(--warn);
    }
    .check-detail {
      margin-top: 10px;
      padding: 10px;
      background: var(--warn-bg);
      border-radius: 8px;
      border-left: 3px solid var(--warn);
    }
    .check-detail textarea {
      width: 100%;
      min-height: 60px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      background: var(--white);
    }
    .check-detail textarea:focus {
      outline: none;
      border-color: var(--warn);
    }
    .fixed-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--info);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .fixed-check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--info);
    }
    .photo-input {
      margin-top: 8px;
      font-size: 13px;
    }
    .photo-input label {
      display: inline-block;
      padding: 8px 12px;
      background: var(--g-pale);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--g-deep);
      font-weight: 600;
      cursor: pointer;
    }
    .photo-input input[type="file"] { display: none; }
    .photo-preview {
      margin-top: 8px;
      max-width: 200px;
      max-height: 150px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* Fuel picker */
    .fuel-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 14px;
    }
    .fuel-btn {
      padding: 14px 8px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      min-height: 56px;
      color: var(--text);
      transition: all 0.1s;
    }
    .fuel-btn:active { transform: scale(0.96); }
    .fuel-btn.active {
      background: var(--warn);
      color: var(--white);
      border-color: var(--warn);
    }
    .fuel-btn.active.full {
      background: var(--g-mid);
      border-color: var(--g-mid);
    }

    /* Tire grid */
    .tire-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 14px;
    }
    .tire-cell {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    .tire-cell.bad { border-color: var(--bad); background: var(--bad-bg); }
    .tire-cell label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .tire-cell .range {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .tire-cell input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      background: var(--white);
      text-align: center;
      min-height: 44px;
    }
    .tire-cell.bad input { border-color: var(--bad); color: var(--bad); }

    /* Electronics row */
    .yn-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .yn-row:last-child { border-bottom: none; }
    .yn-row.critical-bad {
      background: var(--bad-bg);
    }
    .yn-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .crit-badge {
      background: var(--bad);
      color: var(--white);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .yn-buttons { display: flex; gap: 6px; }
    .yn-btn {
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 60px;
      min-height: 44px;
    }
    .yn-btn.yes.active { background: var(--g-mid); color: var(--white); border-color: var(--g-mid); }
    .yn-btn.no.active { background: var(--bad); color: var(--white); border-color: var(--bad); }

    /* Cooler detail */
    .cooler-detail {
      padding: 12px 14px;
      background: var(--bad-bg);
      border-top: 1px solid var(--border);
    }

    /* Compartment cards */
    .compartment-list { padding: 8px 12px; }
    .compartment-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .compartment-card.complete { border-color: var(--g-accent); }
    .compartment-card.has-flag { border-color: var(--warn); }
    .compartment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      gap: 8px;
    }
    .compartment-head-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .compartment-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--g-deep);
    }
    .compartment-counts {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .compartment-expand {
      font-size: 24px;
      color: var(--muted);
      transition: transform 0.2s;
      width: 28px;
      text-align: center;
    }
    .compartment-card.open .compartment-expand { transform: rotate(180deg); }
    .compartment-body { display: none; padding: 0 14px 14px; }
    .compartment-card.open .compartment-body { display: block; }
    .compartment-status-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-name {
      flex: 1;
      font-size: 15px;
      line-height: 1.3;
    }
    .item-qty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      margin-left: 6px;
    }
    .item-ctrl-badge {
      display: inline-block;
      background: var(--info);
      color: var(--white);
      font-size: 9px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      margin-left: 6px;
      vertical-align: middle;
    }
    .item-buttons { display: flex; gap: 4px; }
    .item-btn {
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
      letter-spacing: 0.02em;
    }
    .item-btn.complete.active { background: var(--g-mid); color: var(--white); border-color: var(--g-mid); }
    .item-btn.incomplete.active { background: var(--bad); color: var(--white); border-color: var(--bad); }
    .mark-all-btn {
      width: 100%;
      padding: 10px;
      background: var(--g-pale);
      border: 1px dashed var(--g-accent);
      border-radius: 8px;
      color: var(--g-deep);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .mark-all-btn:active { background: var(--g-light); }

    /* Comments box (rescue rig) */
    .comments-box {
      padding: 14px;
    }
    .comments-box textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      resize: vertical;
      background: var(--bg);
    }

    /* Submit button */
    .submit-wrap {
      padding: 20px 14px 30px;
      text-align: center;
    }
    .submit-btn {
      background: var(--g-deep);
      color: var(--white);
      padding: 18px 28px;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      max-width: 480px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 0 4px 14px rgba(28,58,28,0.3);
      min-height: 60px;
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      background: var(--muted);
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Bottom status bar */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--g-deep);
      color: var(--white);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.25);
      z-index: 20;
      display: none;
    }
    .status-bar.visible { display: block; }
    .status-text {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-track {
      height: 8px;
      background: rgba(255,255,255,0.18);
      border-radius: 4px;
      overflow: hidden;
    }
    .status-fill {
      height: 100%;
      background: var(--g-light);
      transition: width 0.3s;
      width: 0%;
    }

    /* Success */
    .success {
      text-align: center;
      padding: 60px 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }
    .success h2 {
      font-size: 24px;
      color: var(--g-deep);
      margin: 0 0 8px;
    }
    .success p {
      color: var(--muted);
      margin: 8px 0;
    }
    .success-summary {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .success-summary .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .success-summary .row:last-child { border-bottom: none; }
    .success-summary .row strong { color: var(--g-deep); }
    .home-link {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 24px;
      background: var(--g-deep);
      color: var(--white);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 14px;
    }

    /* Loading / error */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .error-box {
      background: var(--bad-bg);
      border: 1.5px solid var(--bad);
      border-radius: 10px;
      padding: 14px;
      margin: 14px;
      color: var(--bad);
      font-size: 14px;
    }

    @media (min-width: 600px) {
      .home-buttons { flex-direction: row; }
      .home-btn { height: 220px; }
      .tire-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- ============ HOME SCREEN ============ -->
<div class="screen home active" id="screen-home">
  <div class="home-logo"><img src="./logo.png" alt="NCEMS Logo" /></div>
  <div class="home-title">North Country EMS / FD 13</div>
  <div class="home-sub">Daily Apparatus Check</div>
  <div class="home-buttons">
    <button class="home-btn ambulances" id="home-btn-ambulances" type="button">
      <div class="home-btn-label">Ambulances</div>
    </button>
    <button class="home-btn others" id="home-btn-others" type="button">
      <div class="home-btn-label">Other Units</div>
    </button>
  </div>
  <div class="home-footer">v<span id="version-tag">2.0.1</span> · <span id="today-date"></span></div>
</div>

<!-- ============ AMBULANCE PICKER ============ -->
<div class="screen" id="screen-ambulance-picker">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="header-title">Pick an Ambulance</div>
  </div>
  <div class="picker-wrap" id="ambulance-picker-list"></div>
</div>

<!-- ============ RESCUE PICKER ============ -->
<div class="screen" id="screen-rescue-picker">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="header-title">Pick a Rescue Unit</div>
  </div>
  <div class="picker-wrap" id="rescue-picker-list"></div>
</div>

<!-- ============ CHECK FORM ============ -->
<div class="screen" id="screen-check">
  <div class="header">
    <button class="back-btn" onclick="confirmExitCheck()">← Back</button>
    <div class="header-title" id="check-title">Check</div>
  </div>
  <div class="form-wrap" id="check-body"></div>
</div>

<!-- ============ SUCCESS ============ -->
<div class="screen" id="screen-success">
  <div class="header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="header-title">Submitted</div>
  </div>
  <div class="success" id="success-body"></div>
</div>

<!-- ============ STATUS BAR ============ -->
<div class="status-bar" id="status-bar">
  <div class="status-text">
    <span id="status-label">Check is 0% complete</span>
    <span id="status-flags"></span>
  </div>
  <div class="status-track"><div class="status-fill" id="status-fill"></div></div>
</div>

<script>
'use strict';

/* ============================================================
   APP STATE
   ============================================================ */
const APP = {
  version: '2.0.0',
  data: null,        // loaded units.json
  screen: 'home',
  check: null,       // current in-progress check
};

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ============================================================
   BOOT
   ============================================================ */
window.addEventListener('DOMContentLoaded', boot);

async function boot() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  // Wire up home buttons via addEventListener (robust on mobile)
  document.getElementById('home-btn-ambulances').addEventListener('click', showAmbulancePicker);
  document.getElementById('home-btn-others').addEventListener('click', showRescuePicker);

  try {
    const res = await fetch(`./units.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Failed to load units.json: ${res.status}`);
    APP.data = await res.json();
    document.getElementById('version-tag').textContent = APP.data.version || APP.version;
    // Initialize EmailJS
    if (APP.data.emailjs && APP.data.emailjs.publicKey && window.emailjs) {
      emailjs.init({ publicKey: APP.data.emailjs.publicKey });
    }
  } catch (err) {
    document.body.insertAdjacentHTML('afterbegin',
      `<div class="error-box">Failed to load units.json: ${err.message}. Check that units.json is uploaded next to index.html.</div>`);
    console.error(err);
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
  APP.screen = id;
  document.getElementById('status-bar').classList.toggle('visible', id === 'check');
}

function goHome() {
  if (APP.screen === 'check' && hasUnsavedWork()) {
    if (!confirm('You have unsaved work. Discard and go back to home?')) return;
  }
  APP.check = null;
  showScreen('home');
}

function confirmExitCheck() {
  if (hasUnsavedWork()) {
    if (!confirm('You have unsaved work. Discard and go back?')) return;
  }
  APP.check = null;
  showScreen('home');
}

function hasUnsavedWork() {
  if (!APP.check) return false;
  const c = APP.check;
  return !!(c.initials || c.mileage || c.walkAround?.notes ||
            Object.keys(c.mechanical || {}).length ||
            Object.keys(c.fluids || {}).length ||
            c.fuel || (c.tires && c.tires.some(t => t)) ||
            Object.keys(c.electronics || {}).length ||
            c.cooler?.answered ||
            Object.keys(c.compartments || {}).length ||
            Object.keys(c.rescueChecks || {}).length ||
            c.comments);
}

/* ============================================================
   AMBULANCE PICKER
   ============================================================ */
function showAmbulancePicker() {
  const list = document.getElementById('ambulance-picker-list');
  list.innerHTML = '';
  const intro = document.createElement('p');
  intro.className = 'picker-intro';
  intro.textContent = "Pick the ambulance you're checking today.";
  list.appendChild(intro);

  APP.data.ambulances.forEach(amb => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div>
        <div>${escapeHTML(amb.name)}</div>
        <div class="unit-meta">${escapeHTML(amb.type)}</div>
      </div>
      <div class="unit-btn-arrow">→</div>
    `;
    btn.addEventListener('click', () => startAmbulanceCheck(amb.id));
    list.appendChild(btn);
  });
  showScreen('ambulance-picker');
}

/* ============================================================
   RESCUE PICKER (with day-of-week rotation)
   ============================================================ */
function showRescuePicker() {
  const list = document.getElementById('rescue-picker-list');
  const today = DAY_NAMES[new Date().getDay()];
  const dueToday = APP.data.rescueRotation[today] || [];
  const allRescue = APP.data.allRescueUnits;
  const rest = allRescue.filter(u => !dueToday.includes(u));

  list.innerHTML = '';

  if (dueToday.length > 0) {
    const banner = document.createElement('div');
    banner.className = 'due-banner';
    banner.textContent = `Due Today (${today}): ${dueToday.join(', ')}`;
    list.appendChild(banner);

    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = `Scheduled for ${today}`;
    list.appendChild(lbl);

    dueToday.forEach(u => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'unit-btn due-today';
      btn.innerHTML = `
        <div>
          <div>${escapeHTML(u)}</div>
          <div class="unit-meta">Due today</div>
        </div>
        <div class="unit-btn-arrow">→</div>
      `;
      btn.addEventListener('click', () => startRescueCheck(u));
      list.appendChild(btn);
    });

    const lbl2 = document.createElement('div');
    lbl2.className = 'section-label';
    lbl2.textContent = 'Other rescue units';
    list.appendChild(lbl2);
  } else {
    const intro = document.createElement('p');
    intro.className = 'picker-intro';
    intro.textContent = `No rigs scheduled for ${today}. Pick any unit to run a check.`;
    list.appendChild(intro);
  }

  rest.forEach(u => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div>
        <div>${escapeHTML(u)}</div>
        <div class="unit-meta">Optional</div>
      </div>
      <div class="unit-btn-arrow">→</div>
    `;
    btn.addEventListener('click', () => startRescueCheck(u));
    list.appendChild(btn);
  });

  showScreen('rescue-picker');
}

/* ============================================================
   START AMBULANCE CHECK
   ============================================================ */
function startAmbulanceCheck(unitId) {
  const amb = APP.data.ambulances.find(a => a.id === unitId);
  if (!amb) return;
  const comps = APP.data.ambulanceCompartments[unitId];
  APP.check = {
    type: 'ambulance',
    unitId,
    unitName: amb.name,
    date: new Date().toISOString().slice(0,10),
    initials: '',
    mileage: '',
    walkAround: { notes: '', photo: null },
    mechanical: {},
    fluids: {},
    fuel: null,
    tires: ['','','','','',''],
    electronics: {},
    cooler: { answered: false, ok: null, reading: '', photo: null },
    compartments: {}, // { compName: { status, notes, fixed, photo, items: {itemName: bool} } }
    _comps: comps,
  };
  renderAmbulanceCheck();
  showScreen('check');
  updateProgress();
}

function renderAmbulanceCheck() {
  const c = APP.check;
  document.getElementById('check-title').innerHTML =
    `${c.unitName} <span class="header-sub">· ${formatDate(c.date)}</span>`;

  const body = document.getElementById('check-body');
  body.innerHTML = `
    ${renderMetaBlock()}
    ${renderWalkAroundSection()}
    ${renderMechanicalSection()}
    ${renderFluidsSection()}
    ${renderFuelSection()}
    ${renderTireSection()}
    ${renderElectronicsSection()}
    ${renderCoolerSection()}
    ${renderCompartmentSection('Exterior Compartments', 'exterior', c._comps.exterior)}
    ${renderCompartmentSection('Interior Compartments', 'interior', c._comps.interior)}
    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitCheck()">Submit Check</button>
    </div>
  `;
  attachAmbulanceHandlers();
}

/* ============================================================
   START RESCUE CHECK
   ============================================================ */
function startRescueCheck(unitName) {
  APP.check = {
    type: 'rescue',
    unitId: unitName,
    unitName: unitName,
    date: new Date().toISOString().slice(0,10),
    initials: '',
    mileage: '',
    rescueChecks: {},
    comments: '',
  };
  renderRescueCheck();
  showScreen('check');
  updateProgress();
}

function renderRescueCheck() {
  const c = APP.check;
  document.getElementById('check-title').innerHTML =
    `${c.unitName} <span class="header-sub">· ${formatDate(c.date)}</span>`;
  const checks = APP.data.rescueRigChecks;
  const body = document.getElementById('check-body');

  body.innerHTML = `
    <div class="meta-block">
      <div class="meta-row">
        <label>Initials</label>
        <input type="text" id="rescue-initials" placeholder="e.g. DB" maxlength="6" />
      </div>
      <div class="meta-row">
        <label>Mileage</label>
        <input type="number" id="rescue-mileage" placeholder="Current mileage" />
      </div>
    </div>
    ${renderRescueGroup('Exterior & Lights', 'exterior', checks.exterior)}
    ${renderRescueGroup('Fluids & Fuel', 'fluids', checks.fluids)}
    ${renderRescueGroup('Interior & Equipment', 'interior', checks.interior)}
    ${renderRescueGroup('Operational', 'operational', checks.operational)}
    ${renderRescueGroup('Cleaning', 'cleaning', checks.cleaning)}
    <div class="section">
      <div class="section-head">Comments</div>
      <div class="comments-body comments-box">
        <textarea id="rescue-comments" placeholder="Any notes, deficiencies, or observations..."></textarea>
      </div>
    </div>
    <div class="submit-wrap">
      <button class="submit-btn" onclick="submitCheck()">Submit Check</button>
    </div>
  `;
  attachRescueHandlers();
}

function renderRescueGroup(title, group, items) {
  let html = `<div class="section"><div class="section-head">${title}</div><div class="section-body">`;
  items.forEach(item => {
    const key = `${group}::${item}`;
    html += renderWNLRow(item, key, 'rescueChecks');
  });
  html += `</div></div>`;
  return html;
}

function attachRescueHandlers() {
  document.getElementById('rescue-initials').oninput = e => { APP.check.initials = e.target.value; updateProgress(); };
  document.getElementById('rescue-mileage').oninput = e => { APP.check.mileage = e.target.value; updateProgress(); };
  document.getElementById('rescue-comments').oninput = e => { APP.check.comments = e.target.value; };

  // Wire up the WNL rows for the rescue check
  document.querySelectorAll('.check-row[data-bucket="rescueChecks"]').forEach(row => {
    const key = row.dataset.key;
    const safeKey = key.replace(/[^a-zA-Z0-9]/g, '_');
    row.querySelectorAll('.check-btn').forEach(btn => {
      btn.onclick = () => {
        const status = btn.dataset.status;
        row.querySelectorAll('.check-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check.rescueChecks[key] = APP.check.rescueChecks[key] || {};
        APP.check.rescueChecks[key].status = status;
        document.getElementById('detail-' + safeKey).style.display = status === 'bad' ? 'block' : 'none';
        updateProgress();
      };
    });
    const detail = document.getElementById('detail-' + safeKey);
    detail.querySelector('textarea').oninput = e => {
      APP.check.rescueChecks[key] = APP.check.rescueChecks[key] || {};
      APP.check.rescueChecks[key].notes = e.target.value;
    };
    detail.querySelector('[data-fixed]').onchange = e => {
      APP.check.rescueChecks[key] = APP.check.rescueChecks[key] || {};
      APP.check.rescueChecks[key].fixed = e.target.checked;
    };
  });
}

/* ============================================================
   RENDERERS (ambulance form sections)
   ============================================================ */
function renderMetaBlock() {
  return `
    <div class="meta-block">
      <div class="meta-row">
        <label>Initials</label>
        <input type="text" id="meta-initials" placeholder="e.g. DB" maxlength="6" />
      </div>
      <div class="meta-row">
        <label>Mileage</label>
        <input type="number" id="meta-mileage" placeholder="Starting mileage" />
      </div>
    </div>
  `;
}

function renderWalkAroundSection() {
  return `
    <div class="section">
      <div class="section-head">Walk-Around</div>
      <div class="section-body">
        <div class="check-row">
          <textarea id="walkaround-notes" placeholder="Any damage, leaks, or hazards noted on walk-around? (Leave blank if all clear.)" style="width:100%;min-height:70px;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:15px;background:var(--bg);"></textarea>
          <div class="photo-input">
            <label for="walkaround-photo">📷 Add photo (optional)</label>
            <input type="file" id="walkaround-photo" accept="image/*" capture="environment" />
            <div id="walkaround-photo-preview"></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderMechanicalSection() {
  let html = `<div class="section"><div class="section-head">Mechanical & Lights</div><div class="section-body">`;
  APP.data.mechanicalChecks.forEach(item => {
    html += renderWNLRow(item, item, 'mechanical');
  });
  html += `</div></div>`;
  return html;
}

function renderFluidsSection() {
  let html = `<div class="section"><div class="section-head">Fluids</div><div class="section-body">`;
  APP.data.fluidChecks.forEach(item => {
    html += renderWNLRow(item, item, 'fluids');
  });
  html += `</div></div>`;
  return html;
}

function renderWNLRow(label, key, stateBucket) {
  const safeKey = key.replace(/[^a-zA-Z0-9]/g, '_');
  return `
    <div class="check-row" data-key="${key}" data-bucket="${stateBucket}">
      <div class="check-row-main">
        <div class="check-label">${label}</div>
        <div class="check-buttons">
          <button class="check-btn wnl" data-status="wnl">WNL</button>
          <button class="check-btn bad" data-status="bad">Abnormal</button>
        </div>
      </div>
      <div class="check-detail" id="detail-${safeKey}" style="display:none;">
        <textarea placeholder="What was wrong? (notes)"></textarea>
        <label class="fixed-check">
          <input type="checkbox" data-fixed />
          Fixed on the spot
        </label>
      </div>
    </div>
  `;
}

function renderFuelSection() {
  return `
    <div class="section">
      <div class="section-head">Fuel Level</div>
      <div class="section-body">
        <div class="fuel-picker" id="fuel-picker">
          <button class="fuel-btn" data-fuel="1/4">¼</button>
          <button class="fuel-btn" data-fuel="1/2">½</button>
          <button class="fuel-btn" data-fuel="3/4">¾</button>
          <button class="fuel-btn full" data-fuel="Full">Full</button>
        </div>
      </div>
    </div>
  `;
}

function renderTireSection() {
  let html = `<div class="section"><div class="section-head">Tire Pressure (PSI)</div><div class="tire-grid">`;
  APP.data.tirePositions.forEach((pos, idx) => {
    html += `
      <div class="tire-cell" id="tire-cell-${idx}">
        <label>${pos.label}</label>
        <div class="range">${pos.min}–${pos.max} PSI</div>
        <input type="number" data-tire="${idx}" data-min="${pos.min}" data-max="${pos.max}" inputmode="numeric" />
      </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderElectronicsSection() {
  let html = `<div class="section"><div class="section-head">Electronics</div><div class="section-body">`;
  APP.data.electronicsDevices.forEach(dev => {
    const badge = dev.critical ? '<span class="crit-badge">Critical</span>' : '';
    html += `
      <div class="yn-row" data-device="${dev.name}" data-critical="${dev.critical}">
        <div class="yn-label">${dev.name}${badge}</div>
        <div class="yn-buttons">
          <button class="yn-btn yes" data-yn="yes">Yes</button>
          <button class="yn-btn no" data-yn="no">No</button>
        </div>
      </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderCoolerSection() {
  return `
    <div class="section">
      <div class="section-head">Cooler / Fridge</div>
      <div class="section-body">
        <div class="yn-row" data-cooler>
          <div class="yn-label">Reading between 4°C and 9°C?</div>
          <div class="yn-buttons">
            <button class="yn-btn yes" data-cooler-yn="yes">Yes</button>
            <button class="yn-btn no" data-cooler-yn="no">No</button>
          </div>
        </div>
        <div class="cooler-detail" id="cooler-detail" style="display:none;">
          <div class="meta-row">
            <label>Reading</label>
            <input type="number" id="cooler-reading" placeholder="°C" step="0.1" />
          </div>
          <div class="photo-input">
            <label for="cooler-photo">📷 Photo of thermometer</label>
            <input type="file" id="cooler-photo" accept="image/*" capture="environment" />
            <div id="cooler-photo-preview"></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderCompartmentSection(title, type, compartments) {
  let html = `<div class="section"><div class="section-head">${title} (${compartments.length})</div>`;
  html += `<div class="compartment-list">`;
  compartments.forEach((comp, idx) => {
    const safeId = `${type}-${idx}`;
    html += `
      <div class="compartment-card" data-compartment="${comp.name}" data-type="${type}" id="comp-${safeId}">
        <div class="compartment-head" onclick="toggleCompartment('${safeId}')">
          <div class="compartment-head-left">
            <div>
              <div class="compartment-name">${comp.name}</div>
              <div class="compartment-counts" id="comp-counts-${safeId}">${comp.items.length} items</div>
            </div>
          </div>
          <div class="compartment-expand">▼</div>
        </div>
        <div class="compartment-body">
          <div class="compartment-status-row">
            <button class="check-btn wnl" data-comp-status="wnl">WNL</button>
            <button class="check-btn bad" data-comp-status="bad">Abnormal</button>
          </div>
          <div class="check-detail" id="comp-detail-${safeId}" style="display:none;">
            <textarea placeholder="What's wrong with this compartment?"></textarea>
            <label class="fixed-check">
              <input type="checkbox" data-comp-fixed />
              Fixed on the spot
            </label>
          </div>
          ${comp.items.length > 0 ? `
            <button class="mark-all-btn" onclick="markAllItems('${safeId}', '${comp.name}', 'complete')">Mark All Complete</button>
            <div class="item-list">
              ${comp.items.map((it, itIdx) => `
                <div class="item-row" data-item-idx="${itIdx}" data-item-name="${escapeAttr(it.name)}">
                  <div class="item-name">
                    ${escapeHTML(it.name)}
                    <span class="item-qty">×${it.qty}</span>
                    ${it.ctrl ? '<span class="item-ctrl-badge">CTRL</span>' : ''}
                  </div>
                  <div class="item-buttons">
                    <button class="item-btn complete" data-item-status="complete">✓</button>
                    <button class="item-btn incomplete" data-item-status="incomplete">✗</button>
                  </div>
                </div>
              `).join('')}
            </div>
          ` : '<p style="color:var(--muted);font-size:13px;text-align:center;padding:10px;">No items tracked.</p>'}
        </div>
      </div>
    `;
  });
  html += `</div></div>`;
  return html;
}

/* ============================================================
   HANDLERS (ambulance check)
   ============================================================ */
function attachAmbulanceHandlers() {
  document.getElementById('meta-initials').oninput = e => { APP.check.initials = e.target.value; updateProgress(); };
  document.getElementById('meta-mileage').oninput = e => { APP.check.mileage = e.target.value; updateProgress(); };
  document.getElementById('walkaround-notes').oninput = e => { APP.check.walkAround.notes = e.target.value; };
  document.getElementById('walkaround-photo').onchange = e => handlePhoto(e, 'walkAround', 'walkaround-photo-preview');

  // WNL rows (mechanical, fluids)
  document.querySelectorAll('.check-row').forEach(row => {
    const key = row.dataset.key;
    const bucket = row.dataset.bucket;
    const safeKey = key.replace(/[^a-zA-Z0-9]/g, '_');
    row.querySelectorAll('.check-btn').forEach(btn => {
      btn.onclick = () => {
        const status = btn.dataset.status;
        row.querySelectorAll('.check-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check[bucket][key] = APP.check[bucket][key] || {};
        APP.check[bucket][key].status = status;
        document.getElementById('detail-' + safeKey).style.display = status === 'bad' ? 'block' : 'none';
        updateProgress();
      };
    });
    const detail = document.getElementById('detail-' + safeKey);
    detail.querySelector('textarea').oninput = e => {
      APP.check[bucket][key] = APP.check[bucket][key] || {};
      APP.check[bucket][key].notes = e.target.value;
    };
    detail.querySelector('[data-fixed]').onchange = e => {
      APP.check[bucket][key] = APP.check[bucket][key] || {};
      APP.check[bucket][key].fixed = e.target.checked;
    };
  });

  // Fuel
  document.querySelectorAll('.fuel-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      APP.check.fuel = btn.dataset.fuel;
      updateProgress();
    };
  });

  // Tires
  document.querySelectorAll('[data-tire]').forEach(input => {
    input.oninput = e => {
      const idx = parseInt(e.target.dataset.tire);
      APP.check.tires[idx] = e.target.value;
      const min = parseFloat(e.target.dataset.min);
      const max = parseFloat(e.target.dataset.max);
      const v = parseFloat(e.target.value);
      const cell = document.getElementById('tire-cell-' + idx);
      if (!isNaN(v) && (v < min || v > max)) cell.classList.add('bad');
      else cell.classList.remove('bad');
      updateProgress();
    };
  });

  // Electronics
  document.querySelectorAll('[data-device]').forEach(row => {
    const dev = row.dataset.device;
    const critical = row.dataset.critical === 'true';
    row.querySelectorAll('.yn-btn').forEach(btn => {
      btn.onclick = () => {
        const val = btn.dataset.yn;
        row.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check.electronics[dev] = val === 'yes';
        row.classList.toggle('critical-bad', critical && val === 'no');
        updateProgress();
      };
    });
  });

  // Cooler
  document.querySelectorAll('[data-cooler-yn]').forEach(btn => {
    btn.onclick = () => {
      const val = btn.dataset.coolerYn;
      document.querySelectorAll('[data-cooler-yn]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      APP.check.cooler.answered = true;
      APP.check.cooler.ok = val === 'yes';
      document.getElementById('cooler-detail').style.display = val === 'no' ? 'block' : 'none';
      updateProgress();
    };
  });
  document.getElementById('cooler-reading').oninput = e => { APP.check.cooler.reading = e.target.value; };
  document.getElementById('cooler-photo').onchange = e => handlePhoto(e, 'cooler', 'cooler-photo-preview');

  // Compartments
  document.querySelectorAll('.compartment-card').forEach(card => {
    const name = card.dataset.compartment;
    card.querySelectorAll('[data-comp-status]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const status = btn.dataset.compStatus;
        card.querySelectorAll('[data-comp-status]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        APP.check.compartments[name] = APP.check.compartments[name] || { items: {} };
        APP.check.compartments[name].status = status;
        const det = card.querySelector('[id^=comp-detail-]');
        det.style.display = status === 'bad' ? 'block' : 'none';
        card.classList.toggle('has-flag', status === 'bad');
        updateCompartmentCard(card, name);
        updateProgress();
      };
    });
    const detail = card.querySelector('[id^=comp-detail-]');
    if (detail) {
      detail.querySelector('textarea').oninput = e => {
        APP.check.compartments[name] = APP.check.compartments[name] || { items: {} };
        APP.check.compartments[name].notes = e.target.value;
      };
      detail.querySelector('[data-comp-fixed]').onchange = e => {
        APP.check.compartments[name] = APP.check.compartments[name] || { items: {} };
        APP.check.compartments[name].fixed = e.target.checked;
      };
    }
    // Item buttons
    card.querySelectorAll('.item-row').forEach(itemRow => {
      const itemName = itemRow.dataset.itemName;
      itemRow.querySelectorAll('.item-btn').forEach(btn => {
        btn.onclick = () => {
          const status = btn.dataset.itemStatus;
          itemRow.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          APP.check.compartments[name] = APP.check.compartments[name] || { items: {} };
          APP.check.compartments[name].items = APP.check.compartments[name].items || {};
          APP.check.compartments[name].items[itemName] = status === 'complete';
          updateCompartmentCard(card, name);
        };
      });
    });
  });

  // Rescue checks (only relevant if this is a rescue check, but reuse the same WNL row handler logic)
  // (Handled in attachRescueHandlers separately)
}

function toggleCompartment(safeId) {
  const card = document.getElementById('comp-' + safeId);
  if (card) card.classList.toggle('open');
}

function markAllItems(safeId, compName, status) {
  const card = document.getElementById('comp-' + safeId);
  if (!card) return;
  card.querySelectorAll('.item-row').forEach(itemRow => {
    const itemName = itemRow.dataset.itemName;
    itemRow.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
    const targetBtn = itemRow.querySelector(`[data-item-status="${status}"]`);
    if (targetBtn) targetBtn.classList.add('active');
    APP.check.compartments[compName] = APP.check.compartments[compName] || { items: {} };
    APP.check.compartments[compName].items = APP.check.compartments[compName].items || {};
    APP.check.compartments[compName].items[itemName] = status === 'complete';
  });
  updateCompartmentCard(card, compName);
}

function updateCompartmentCard(card, name) {
  const state = APP.check.compartments[name];
  if (!state) return;
  const itemCount = card.querySelectorAll('.item-row').length;
  const touched = Object.keys(state.items || {}).length;
  const completed = Object.values(state.items || {}).filter(v => v === true).length;
  const incomplete = Object.values(state.items || {}).filter(v => v === false).length;
  const counts = card.querySelector('[id^=comp-counts-]');
  if (counts) {
    if (itemCount === 0) counts.textContent = 'No items';
    else if (touched === 0) counts.textContent = `${itemCount} items`;
    else counts.textContent = `${completed} complete · ${incomplete} incomplete · ${itemCount} total`;
  }
  card.classList.toggle('complete', itemCount > 0 && completed === itemCount);
}

/* ============================================================
   PHOTOS
   ============================================================ */
function handlePhoto(e, target, previewId) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    if (target === 'walkAround') APP.check.walkAround.photo = ev.target.result;
    else if (target === 'cooler') APP.check.cooler.photo = ev.target.result;
    const preview = document.getElementById(previewId);
    if (preview) preview.innerHTML = `<img class="photo-preview" src="${ev.target.result}" />`;
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   PROGRESS
   ============================================================ */
function updateProgress() {
  const c = APP.check;
  if (!c) return;
  let total = 0, done = 0, flags = 0;

  if (c.type === 'ambulance') {
    // Meta
    total += 2; if (c.initials) done++; if (c.mileage) done++;
    // Mechanical + Fluids
    [...APP.data.mechanicalChecks, ...APP.data.fluidChecks].forEach(item => {
      total++;
      const bucketFor = APP.data.mechanicalChecks.includes(item) ? c.mechanical : c.fluids;
      if (bucketFor[item]?.status) {
        done++;
        if (bucketFor[item].status === 'bad' && !bucketFor[item].fixed) flags++;
      }
    });
    // Fuel
    total++; if (c.fuel) { done++; if (c.fuel !== 'Full') flags++; }
    // Tires
    APP.data.tirePositions.forEach((pos, i) => {
      total++;
      if (c.tires[i]) {
        done++;
        const v = parseFloat(c.tires[i]);
        if (!isNaN(v) && (v < pos.min || v > pos.max)) flags++;
      }
    });
    // Electronics
    APP.data.electronicsDevices.forEach(dev => {
      total++;
      if (c.electronics[dev.name] !== undefined) {
        done++;
        if (dev.critical && c.electronics[dev.name] === false) flags++;
      }
    });
    // Cooler
    total++; if (c.cooler.answered) { done++; if (c.cooler.ok === false) flags++; }
    // Compartments
    [...c._comps.exterior, ...c._comps.interior].forEach(comp => {
      total++;
      const st = c.compartments[comp.name];
      if (st?.status) {
        done++;
        if (st.status === 'bad' && !st.fixed) flags++;
      }
    });
  } else if (c.type === 'rescue') {
    total += 2; // initials, mileage
    if (c.initials) done++;
    if (c.mileage) done++;
    const r = APP.data.rescueRigChecks;
    ['exterior','fluids','interior','operational','cleaning'].forEach(group => {
      r[group].forEach(item => {
        total++;
        const key = `${group}::${item}`;
        if (c.rescueChecks[key]?.status) {
          done++;
          if (c.rescueChecks[key].status === 'bad' && !c.rescueChecks[key].fixed) flags++;
        }
      });
    });
  }

  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const label = c.type === 'ambulance' ? 'Ambulance check' : 'Rescue check';
  document.getElementById('status-label').textContent = `${label} is ${pct}% complete`;
  document.getElementById('status-flags').textContent = flags > 0 ? `⚠ ${flags} flag${flags===1?'':'s'}` : '';
  document.getElementById('status-fill').style.width = pct + '%';
}

/* ============================================================
   SUBMIT
   ============================================================ */
async function submitCheck() {
  const c = APP.check;
  if (!c) return;
  if (!c.initials) {
    alert('Please enter your initials before submitting.');
    return;
  }

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const summary = buildSummary();
    const params = {
      unit_id: c.unitName,
      check_date: c.date,
      check_type: c.type,
      initials: c.initials,
      message: summary.plain,
      flags_count: summary.flagCount,
      to_email: APP.data.submissionEmail || 'd.boyce@northcountryems.org',
    };
    await emailjs.send(APP.data.emailjs.serviceId, APP.data.emailjs.templateId, params);
    showSuccess(summary);
  } catch (err) {
    console.error('Submit failed:', err);
    alert('Submit failed: ' + (err.text || err.message || 'unknown error') + '\n\nThe check data is still in the app — try submitting again, or take a screenshot.');
    btn.disabled = false;
    btn.textContent = 'Submit Check';
  }
}

function buildSummary() {
  const c = APP.check;
  const lines = [];
  let flagCount = 0;

  lines.push(`APPARATUS CHECK SUBMISSION`);
  lines.push(`==========================`);
  lines.push(`Unit: ${c.unitName}`);
  lines.push(`Date: ${c.date}`);
  lines.push(`Crew Initials: ${c.initials}`);
  lines.push(`Type: ${c.type === 'ambulance' ? 'Ambulance' : 'Rescue Rig'}`);
  lines.push('');

  if (c.type === 'ambulance') {
    if (c.mileage) lines.push(`Mileage: ${c.mileage}`);
    lines.push('');
    if (c.walkAround.notes) {
      lines.push('WALK-AROUND NOTES:');
      lines.push(c.walkAround.notes);
      lines.push('');
    }
    const sectionsToDump = [
      ['MECHANICAL & LIGHTS', c.mechanical],
      ['FLUIDS', c.fluids],
    ];
    sectionsToDump.forEach(([title, bucket]) => {
      const keys = Object.keys(bucket);
      if (keys.length === 0) return;
      lines.push(title);
      keys.forEach(k => {
        const v = bucket[k];
        let line = `  - ${k}: ${v.status === 'wnl' ? 'WNL' : 'ABNORMAL'}`;
        if (v.status === 'bad') {
          if (v.fixed) line += ' (Fixed on the spot)';
          else { line += ' ⚠'; flagCount++; }
          if (v.notes) line += ` — ${v.notes}`;
        }
        lines.push(line);
      });
      lines.push('');
    });
    if (c.fuel) {
      let fl = `FUEL: ${c.fuel}`;
      if (c.fuel !== 'Full') { fl += ' ⚠ (not Full)'; flagCount++; }
      lines.push(fl);
      lines.push('');
    }
    lines.push('TIRE PRESSURES:');
    APP.data.tirePositions.forEach((pos, i) => {
      const v = c.tires[i];
      let line = `  - ${pos.label}: ${v || '—'} PSI (range ${pos.min}–${pos.max})`;
      const n = parseFloat(v);
      if (!isNaN(n) && (n < pos.min || n > pos.max)) { line += ' ⚠'; flagCount++; }
      lines.push(line);
    });
    lines.push('');
    if (Object.keys(c.electronics).length) {
      lines.push('ELECTRONICS:');
      APP.data.electronicsDevices.forEach(dev => {
        const v = c.electronics[dev.name];
        if (v === undefined) return;
        let line = `  - ${dev.name}: ${v ? 'Yes' : 'No'}`;
        if (dev.critical && !v) { line += ' ⚠ CRITICAL'; flagCount++; }
        lines.push(line);
      });
      lines.push('');
    }
    if (c.cooler.answered) {
      let line = `COOLER (4–9°C): ${c.cooler.ok ? 'Yes (WNL)' : 'No ⚠'}`;
      if (!c.cooler.ok) { flagCount++; if (c.cooler.reading) line += ` — reading: ${c.cooler.reading}°C`; }
      lines.push(line);
      lines.push('');
    }
    // Compartments
    [['EXTERIOR COMPARTMENTS', c._comps.exterior],
     ['INTERIOR COMPARTMENTS', c._comps.interior]].forEach(([title, comps]) => {
      const checked = comps.filter(comp => c.compartments[comp.name]?.status);
      if (checked.length === 0) return;
      lines.push(title);
      checked.forEach(comp => {
        const st = c.compartments[comp.name];
        let line = `  - ${comp.name}: ${st.status === 'wnl' ? 'WNL' : 'ABNORMAL'}`;
        if (st.status === 'bad') {
          if (st.fixed) line += ' (Fixed)';
          else { line += ' ⚠'; flagCount++; }
          if (st.notes) line += ` — ${st.notes}`;
        }
        // Item-level
        const items = st.items || {};
        const incomplete = Object.entries(items).filter(([n,v]) => v === false).map(([n]) => n);
        if (incomplete.length > 0) {
          line += `\n    Missing/incomplete: ${incomplete.join(', ')}`;
          flagCount += incomplete.length;
        }
        lines.push(line);
      });
      lines.push('');
    });
  } else {
    // Rescue rig
    if (c.mileage) lines.push(`Mileage: ${c.mileage}`);
    lines.push('');
    const groups = ['exterior','fluids','interior','operational','cleaning'];
    const groupNames = {
      exterior: 'EXTERIOR & LIGHTS',
      fluids: 'FLUIDS & FUEL',
      interior: 'INTERIOR & EQUIPMENT',
      operational: 'OPERATIONAL',
      cleaning: 'CLEANING'
    };
    groups.forEach(group => {
      const items = APP.data.rescueRigChecks[group];
      const filled = items.filter(item => c.rescueChecks[`${group}::${item}`]?.status);
      if (filled.length === 0) return;
      lines.push(groupNames[group]);
      filled.forEach(item => {
        const v = c.rescueChecks[`${group}::${item}`];
        let line = `  - ${item}: ${v.status === 'wnl' ? 'WNL' : 'ABNORMAL'}`;
        if (v.status === 'bad') {
          if (v.fixed) line += ' (Fixed)';
          else { line += ' ⚠'; flagCount++; }
          if (v.notes) line += ` — ${v.notes}`;
        }
        lines.push(line);
      });
      lines.push('');
    });
    if (c.comments) {
      lines.push('COMMENTS:');
      lines.push(c.comments);
      lines.push('');
    }
  }

  lines.push(`Flags: ${flagCount}`);
  lines.push(`Submitted: ${new Date().toLocaleString()}`);
  return { plain: lines.join('\n'), flagCount };
}

function showSuccess(summary) {
  const c = APP.check;
  document.getElementById('success-body').innerHTML = `
    <div class="success-icon">${summary.flagCount === 0 ? '✅' : '⚠️'}</div>
    <h2>Check Submitted</h2>
    <p>Sent to ${APP.data.submissionEmail}.</p>
    <div class="success-summary">
      <div class="row"><span>Unit</span><strong>${c.unitName}</strong></div>
      <div class="row"><span>Date</span><strong>${formatDate(c.date)}</strong></div>
      <div class="row"><span>Crew</span><strong>${c.initials}</strong></div>
      <div class="row"><span>Flags</span><strong style="color:${summary.flagCount?'var(--bad)':'var(--g-mid)'}">${summary.flagCount}</strong></div>
    </div>
    <p style="font-size:13px;color:var(--muted);">If your partner completes more of the check today, both submissions will arrive separately tagged with the same unit and date.</p>
    <a class="home-link" onclick="goHome()">Back to Home</a>
  `;
  APP.check = null;
  showScreen('success');
}

/* ============================================================
   UTILS
   ============================================================ */
function formatDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${m}/${d}/${y.slice(2)}`;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return escapeHTML(s);
}
